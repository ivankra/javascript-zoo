# Upstream test262 config: see _get_files_params/_get_suite_flags in
# https://github.com/v8/v8/blob/master/test/test262/testcfg.py
v8: &v8
  console_log: ['console.log', 'print']
  stderr_replace_re:
    - 'V8 is running with experimental features enabled. Stability and security will suffer.': ''
  errors_re:
    - '^[^:]+:[0-9]+: (?P<type>[A-Za-z0-9]+Error): (?P<message>.+)$'
  warnings_re:
    - '^[^:]+:[0-9]+: Error: Unhandled Promise.$'
  # Shared flags between d8 and node
  node_flags: &node_flags
    - { tag: 'module', flag: '--module' }
    # Expose gc() and %-intrinsics for $262 prelude
    - --expose-gc
    - --allow-natives-syntax
    # Enable all completed but not yet enabled JavaScript features
    - --js-staging
    - --harmony
    - --future
    # Enable every disabled --harmony-* / --js-* flag that the binary advertises
    # (in progress / experimental flags). Snippet for both node and d8.
    - shell: |
        $BINARY --help --v8-options 2>&1 | \
          sed -n '/type: bool/{x;G;s/\n/ /;p;};h' | \
          grep 'default: --no-' | \
          sed -En 's/^ *(--(harmony|js)-[^ ]+) .*/\1/p'
  # d8-specific flags
  flags:
    - *node_flags
    - --ignore-unhandled-promises  # e.g. test/built-ins/Promise/any/ctx-ctor.js
    - --no-arguments  # disable top-level arguments in d8
    - {tag: "CanBlockIsFalse", flag: "--no-can-block"}
  prelude:
    - file: engines/v8/prelude.js
    - {tag: "IsHTMLDDA", file: engines/v8/prelude-IsHTMLDDA.js}
    - {tag: "source-phase-imports", file: engines/v8/prelude-AbstractModuleSource.js}

