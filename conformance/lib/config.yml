# Per-engine configuration: customization knobs on how to work with each engine.
#
# See EngineConfig in conformance/lib/config.py for schema.
#
# This file is shared between benchmarking and conformance testing scripts,
# read every time at start up to look up configuration for the binary they
# need to run - binary's basename is used as the lookup key.
#
# The config is merged at runtime with with sidecar metadata (<binary>.json)
# and the binary name without _<variant> suffix, if any,
# in the following order, for "<engine>_<variant>" binary basename:
#  * config.yml[default] (lowest-priority defaults, optional)
#  * config.yml[<engine>]
#  * config.yml[<engine>_<variant>]
#  * <engine>_<variant>.json (highest-priority overrides)
#
# SPDX-FileCopyrightText: 2026 Ivan Krasilnikov
# SPDX-License-Identifier: MIT

#default:
#  <common settings for all engines can go here>

.constants:
  # Common pattern to report exceptions
  # e.g. "ReferenceError: x is undefined", "Test262Error: Expected SameValue(«1», «0») to be true"
  exc1: &exception_colon_message '^(?P<type>[A-Za-z0-9]*Error): (?P<message>.+)$'
  # Second common pattern, also used by most of this repo's wrappers
  exc2: &uncaught_exception_colon_message '^Uncaught exception: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
  # Crash strings from language runtime
  rust: &rust_crash_re "^(?P<message>(thread '[^']+'( [(][0-9]+[)])? panicked at .*))$"
  gola: &go_crash_re '^(?P<message>panic: .*)$'
  java: &java_crash_re '^(?P<message>Exception in thread "[^"]+" java.*)'

42tiny-js:
  exceptions_re:
    - '^(?P<type>[A-Za-z0-9]*Error): (?P<message>.+?)(?: at Line:[0-9]+ Column:[0-9]+)*$'

ant:
  exceptions_re:
    - *exception_colon_message
  test262_prelude: 'var print = console.log.bind(console);'

besen:
  bench_ignore_errors: true
  bench_suite: ['richards.js', 'crypto.js', 'deltablue.js', 'navier-stokes.js']
  exceptions_re:
    - *exception_colon_message
    - '^ThrowException: (?P<message>.+?)$'

boa:
  crash_re:
    - *rust_crash_re
  exceptions_re:
    - '^[ ]*[0-9]+: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+?)$'
    - '^Uncaught: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+?)(?: \(.+\))?$'
    - '^Uncaught: "(?P<message>.+?)\]?"$'
  module_flag: --module
  test262_flags: ['--debug-object']  # exposes $boa object
  test262_prelude:
    file: engines/boa/prelude.js

bramblex:
  exceptions_re:
    - *uncaught_exception_colon_message

brimstone: &brimstone
  console_log: console.log
  crash_re:
    - *rust_crash_re
  exceptions_re:
    - *exception_colon_message
  flags:
    - --no-color
    - --annex-b
  module_flag: --module
  test262_flags:
    - --no-color
    - --annex-b
    - --expose-test-262
    - --expose-gc
  # built-in print() with --expose-test-262 only takes strings and
  # doesn't print to stdout/stderr
  test262_prelude: |
    globalThis.print = console.log.bind(console);

carakan:
  exceptions_re:
    - *uncaught_exception_colon_message

castl:
  exceptions_re:
    - '^luajit: (?P<type>[A-Za-z0-9]+Error)(: )?(?P<message>.*)$'
  errors_re:
    - '^luajit: [^ :]+[.]lua:[0-9]+: .+$'
    - '(?i)(error|unsupported|200 local variables)'

cesanta-elk:
  exceptions_re:
    - '^Error: ERROR: (?P<message>.+?)$'

continuum:
  exceptions_re:
    - *uncaught_exception_colon_message
  errors_re:
    - '^Uncaught Exception at line [0-9]+'

cesanta-mjs:
  errors_re:
    - '^MJS error: (?P<message>.+?)$'

cesanta-v7:
  bench_suite: ['richards.js']
  multiple_scripts_with_shared_realm: true
  errors_re:
    - '^Exec error [^:]+: (?P<message>.+?)$'

chakracore: &chakracore
  exceptions_re:
    - *exception_colon_message
  module_flag: -module
  # test262_flags: ['-Test262']  # requires --test-build

dmdscript:
  bench_prelude:
    - 'var console = {log: println}, print = println;'
    - file: bench/prelude-es5.js
  console_log: println
  stderr_replace_re:
    '^1 source files$': ''
  errors_re:
    - '^dmdscript.script.ScriptException@[^ :]+: /[^():]+[(][0-9]+[)] : Error: (?P<message>.+)$'  # syntax error
    - '^dmdscript.script.ScriptException@[^ :]+: (?P<message>.+)$'

dscriptcpp:
  bench_prelude:
    - 'var console = {log: println}, print = println;'
    - file: bench/prelude-es5.js
  bench_suite: ['richards.es1.js']
  console_log: println
  stderr_replace_re:
    'Exception:\n': 'Exception: '
  exceptions_re:
    - '^Exception: (?P<message>.+)$'

duktape: &duktape
  exceptions_re:
    - *exception_colon_message

echosoar:
  bench_transforms: ['hex']
  crash_re:
    - *rust_crash_re
  exceptions_re:
    - *uncaught_exception_colon_message
    - '^\S+: JSIError \{ error_type: (?P<type>[A-Za-z0-9]*Error), message: "(?P<message>[^"]*)"'

ejscript:
  exceptions_re:
    - '^ejs: (?P<type>[A-Za-z0-9]*Error): /[^ :]+[.]js: [0-9]+: (?P<message>.+)$'
    - '^ejs: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+)$'

engine262:
  exceptions_re:
    - *exception_colon_message
    - *uncaught_exception_colon_message  # main.js wrapper
  module_flag: --module

escargot:
  module_flag: --module
  multiple_scripts_with_shared_realm: true
  exceptions_re:
    - '^Script parsing error: (?P<type>SyntaxError): Line [0-9]+: (?P<message>.*)$'
    - '^Uncaught (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*?):?$'

espruino:
  stdout_replace_re:
    '^([| ]____|[|]  |.*espruino.com|.*G.William|Espruino is Open Source|only by sales).*': ''
  exceptions_re:
    - '^Uncaught (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'

eval5:
  exceptions_re:
    - *exception_colon_message
    - *uncaught_exception_colon_message

fastschema-qjs:
  crash_re:
    - *go_crash_re
  exceptions_re:
    - *uncaught_exception_colon_message
  module_flag: --module

fesi: &fesi
  stderr_replace_re:
    '^Syntax error ': 'SyntaxError: '
    '^Lexical error ': 'SyntaxError: '
  exceptions_re:
    - '^(?P<type>SyntaxError): (?P<message>.+)$'
    - '^Runtime error (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
    - '^(?P<message>Runtime error .+)$'
  errors_re:
    - '^(?P<message>.*near line [0-9]+, column [0-9]+)$'
  crash_re:
    - *java_crash_re

flathead:
  exceptions_re:
    - *exception_colon_message

goja:
  crash_re:
    - *go_crash_re
  exceptions_re:
    - *exception_colon_message

graaljs:
  exceptions_re:
    - *exception_colon_message
  module_flag: --module
  test262_flags: ['--experimental-options', '--js.test262-mode=true']

hako:
  crash_re:
    - *go_crash_re
  exceptions_re:
    - *uncaught_exception_colon_message
    - '^  "name": "(?P<type>[A-Za-z0-9]*Error)",?$'  # hako_wamr/hako-cli

hermes: &hermes
  bench_flags:
    - -O  # Expensive optimizations
    - -w  # Disable all warnings
  console_log: print
  stderr_replace_re:
    # Syntax errors: "file.js:14:3: error: invalid statement encountered."
    '([^ ]+[.]js:[0-9]+:[0-9]+: error: .*)': 'SyntaxError \1'
  exceptions_re:
    - '^Uncaught (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.+)$'
    - '(?P<type>(SyntaxError)) [^ ]+[.]js:(?P<line>[0-9]+):[0-9]+: error: (?P<message>.+?)[.]?$'
    - '^[^ ]+[.]js:[0-9]+:[0-9]+: error: (?P<message>.+?)[.]?$'
  test262_prelude:
    file: engines/hermes/prelude.js

hermes-v1: *hermes

iv-lv5:
  exceptions_re:
    # "SyntaxError: file.js:10: SyntaxError: unexpected token class"
    - '^(?P<type>[A-Za-z0-9]*Error): [^ ]+:[0-9]+: \1: (?P<message>.+)$'
    - *exception_colon_message

je-perl:
  exceptions_re:
    - *uncaught_exception_colon_message

jerryscript: &jerryscript
  bench_timeout_for_test:
    splay.js: 300
    typescript.js: 3600
  module_flag: --module
  multiple_scripts_with_shared_realm: true
  exceptions_re:
    - '^Unhandled exception: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'

# TODO: jint - upstream patches needed

jsc: &jsc
  console_log: print
  module_flag: -m
  multiple_scripts_with_shared_realm: true
  exceptions_re:
    - '^Exception: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+)$'
  flags:
    # Enable experimental javascript features
    - --useExplicitResourceManagement=true
    - --useImportDefer=true
    - --useIteratorChunking=true
    - --useMoreCurrencyDisplayChoices=true
    - --useShadowRealm=true
    - --useTemporal=true

js-interpreter:
  exceptions_re:
    - *uncaught_exception_colon_message
    - '^(Exception: |\[)?(?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'

js2py:
  exceptions_re:
    - '^js2py.internals.simplex.JsException: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'

jscript: &jscript
  stderr_replace_re: &jscript_replace
    'Microsoft JScript compilation error: Syntax error': 'Microsoft JScript compilation error: SyntaxError'
  stderr_replace_re: *jscript_replace
  exceptions_re:
    - '^.*Microsoft JScript compilation error: (?P<type>SyntaxError)$'
    # cscript.exe:
    # "Z:\tmp\jscript.Usdqwf.js(4, 1) Microsoft JScript runtime error: 'x' is undefined"
    # "Z:\tmp\jscript.lutTBX.js(5, 1) Microsoft JScript compilation error: Syntax error"
    - '^.*Microsoft JScript runtime error: (?P<message>.*)$'
    - '^.*Microsoft JScript compilation error: (?P<message>.*)$'
    # jscript.cc wrapper:
    # file.js:2 Microsoft JScript compilation error: Syntax error
    # file.js:1 JScript error:
    - '^.*JScript error: ?(?P<message>.*)$'
  # TODO: warmup_cmd

jscript9:
  stderr_replace_re:
    '^Compilation error$': 'SyntaxError'
  exceptions_re:
    - '^(?P<type>SyntaxError)$'
    - *uncaught_exception_colon_message
  # TODO: warmup_cmd

jurassic:
  exceptions_re:
    - *uncaught_exception_colon_message

kiesel:
  module_flag: --module
  exceptions_re:
    - *uncaught_exception_colon_message

kjs:
  stderr_replace_re:
    '^LEAK: [0-9]+ KJS::Node$': ''
  exceptions_re:
    - '^\S+ \(line [0-9]+\): (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'

kodjodevf:
  exceptions_re:
    - *uncaught_exception_colon_message

lebjs:
  bench_suite: ['richards.quad-wheel.js']
  crash_re:
    - *java_crash_re
  exceptions_re:
    - '^Uncaught (?P<type>[A-Za-z0-9]*Error): ?(?P<message>.*)$'
    - *exception_colon_message

libjs: &libjs
  stdout_replace_re:
    # console.log output gets quoted
    '(?m)^"(.*)"$': '\1'
  stderr_replace_re:
    'Uncaught exception: *\n\[([A-Za-z0-9]*Error)\] *': '\1: '
  exceptions_re:
    - *uncaught_exception_colon_message
    - *exception_colon_message
  flags:
    - --disable-ansi-colors
    - --no-syntax-highlight
    - --disable-source-location-hints
    - --disable-debug-output
    - --raw-strings
    - --use-test262-global
  module_flag: --as-module

mocha:
  bench_prelude:
    - 'var console = new Object(); console.log = print;'
  bench_suite: ['richards.es1.js']
  errors_re:
    - '^Mocha: [^,]+[.]js, line [0-9]+: (?P<message>.+?):?$'
    - '^Mocha: (?P<message>.+)$'

modernc-quickjs:
  crash_re:
    - *go_crash_re
  exceptions_re:
    - *uncaught_exception_colon_message
  module_flag: --module

mquickjs: &mquickjs
  bench_prelude:
    - file: bench/prelude-strict.js
  exceptions_re:
    - '^(?P<type>[A-Za-z0-9]*Error): (?P<message>.+)$'

mujs:
  exceptions_re:
    - '^(?P<type>SyntaxError): [^:]+[.]js:[0-9]+: (?P<message>[^\n]+)'
    - *exception_colon_message

narcissus:
  bench_suite: ['richards.js1.js']
  stderr_replace_re:
    '^:[0-9]+:[0-9]+ ': ''
  exceptions_re:
    - *exception_colon_message

nashorn:
  crash_re:
    - *java_crash_re
  flags: ['--language=es6']
  module_flag: -m
  multiple_scripts_with_shared_realm: true
  test262_prelude:
    file: engines/nashorn/prelude.js
  exceptions_re:
    - '^[^:]+[.]js:[0-9]+(:[0-9]+)? (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'

ngs:
  bench_prelude:
    - 'var console = {log: print};'
  bench_suite: ['richards.tiny-js.js']

niljs:
  exceptions_re:
    - *uncaught_exception_colon_message
    - '^NiL.JS.Core.JSException: (?P<type>[A-Za-z0-9]+Error)(: )?(?P<message>.+)$'
  module_flag: --module

njs:
  bench_prelude:
    - file: bench/prelude-strict.js
  bench_transforms: ['octal']
  module_flag: -m
  exceptions_re:
    - *exception_colon_message

nova:
  console_log: print
  flags: ['eval', '--no-strict']
  module_flag: --module
  test262_flags: ['eval', '--no-strict', '--expose-internals']
  test262_prelude:
    file: engines/nova/prelude.js
  crash_re:
    - *rust_crash_re
  stderr_replace_re:
    'SyntaxError:\n\n  [x×] ': 'Uncaught exception: SyntaxError: '
  exceptions_re:
    - '^Uncaught exception: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*?):?$'
    - *uncaught_exception_colon_message
  warnings_re:
    - '^Parse errors:$'
  errors_re:
    - '(^error:|Error:|TypeError|(?:error|panic|exception|uncaught|mismatch|failed|invalid|incorrect|unsupported|cannot|can''t))'

otto:
  crash_re:
    - *go_crash_re
  exceptions_re:
    - *exception_colon_message

porffor:
  bench_prelude:
    - 'var print=console.log;'
  bench_suite: ['richards.porffor.js']
  module_flag: --module
  exceptions_re:
    - *exception_colon_message

primjs:
  exceptions_re:
    - *exception_colon_message

quad-wheel:
  bench_suite: ['richards.quad-wheel.js']

quanta:
  bench_prelude:
    - 'var print=console.log;'
  bench_suite: ['richards.quanta.js']

quickjs: &quickjs
  module_flag: --module
  exceptions_re:
    - *exception_colon_message

quickjs_262:
  # quickjs's run-test262 binary
  <<: *quickjs
  console_log: print  # no console.log() in run-test262
  flags: ['-N']  # -N: run test prepared by test262-harness+eshost

quickjs-ng: &quickjs_ng
  flags: ['--script']  # misdetects module mode often enough
  module_flag: --module
  exceptions_re:
    - *exception_colon_message

quickjs-ng_262:
  <<: *quickjs_ng
  console_log: print  # no console.log() in run-test262
  flags: ['-N']  # -N: run test prepared by test262-harness+eshost

qv4:
  bench_transforms: ['octal']
  module_flag: --module
  stderr_replace_re:
    'qt\.qml\.usedbeforedeclared:': ''
  exceptions_re:
    - *uncaught_exception_colon_message

rapidus:
  bench_prelude:
    - 'var print=console.log;'
  bench_suite: ['richards.rapidus.js']
  crash_re:
    - *rust_crash_re

reeva:
  crash_re:
    - *java_crash_re
  exceptions_re:
    - *exception_colon_message

rhino:
  crash_re:
    - *java_crash_re
  stdout_replace_re:
    # js: "file.js", line 1: Unexpected end of file
    # js: 1+
    # js: .^
    # js: "file.js", line 1: Compilation produced 1 syntax errors.
    '(js: "[^"]+", line [0-9]+): (?P<message>.+\n)(.|\n)*\1: Compilation produced .* syntax error': 'SyntaxError: \2'
  stderr_replace_re:
    'WARNING: .*': ''
  exceptions_re:
    - '^js: "[^"]+", line [0-9]+: uncaught JavaScript runtime exception: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
    - '^js: "[^"]+", line [0-9]+: exception from uncaught JavaScript throw: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
    - '(?P<type>SyntaxError): (?P<message>.+)$'

rpython-langjs:
  exceptions_re:
    - '^ERROR in [^:]+: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+)$'
  multiple_scripts_with_shared_realm: true

rust-js:
  crash_re:
    - *rust_crash_re
  exceptions_re:
    - '^\S+[.]js: (?P<type>[A-Za-z0-9]*Error)(?:: (?P<message>.+))?$'

sablejs:
  warnings_re:
    - '\[WARN\]'
  exceptions_re:
    - '\[ERROR\] compile failed: (?P<type>SyntaxError): (?P<message>.+?)( [(][0-9:]+[)])?$'
    - *uncaught_exception_colon_message

see:
  stderr_replace_re:
    'WARNING: SEE is using non-release malloc': ''
  exceptions_re:
    - '^ *(?P<type>[A-Za-z0-9]*Error): ([^:]+[.]js:[0-9]+: )?(?P<message>.+)$'

sobek:
  crash_re:
    - *go_crash_re
  exceptions_re:
    - *uncaught_exception_colon_message
    - '^(?P<type>[A-Za-z0-9]*Error): [^:]+[.]js: Line (?P<line>[0-9]+):[0-9]+ (?P<message>.+)$'
  module_flag: --module

sophonjs:
  exceptions_re:
    - '^exception (?P<type>[A-Za-z0-9]*Error):(?P<message>.+)$'

spidermonkey: &spidermonkey
  exceptions_re: &sm_exc
    # "/tmp/x.js:1: ReferenceError: x is not defined"
    - '^[^:]+:[0-9]+:?([0-9]+)?:? (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
    # "uncaught exception: Error: x"
    - '^uncaught exception: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+)$'
  module_flag: --module
  flags:
    # Enable experimental javascript features
    - --enable-iterator-helpers
    - --enable-async-iterator-helpers
    - --enable-shadow-realms
    - --enable-symbols-as-weakmap-keys
    - --enable-uint8array-base64
    - --enable-top-level-await
    - --enable-iterator-sequencing
    - --enable-math-sumprecise
    - --enable-error-iserror
    - --enable-iterator-range
    - --enable-joint-iteration
    - --enable-atomics-pause
    - --enable-explicit-resource-management
    - --enable-temporal
    - --enable-upsert
    - --enable-import-bytes
    - --enable-promise-allkeyed
    - --enable-arraybuffer-immutable
    - --enable-iterator-chunking
    - --enable-iterator-join
    - --enable-legacy-regexp

spidermonkey_1.5: &sm15
  # Old SpiderMonkey versions (1.5–1.8.5): need print() + ES5 polyfills.
  bench_prelude:
    - file: bench/prelude-print.js
    - file: bench/prelude-es5.js
  exceptions_re: *sm_exc

spidermonkey_1.6: *sm15
spidermonkey_1.7: *sm15
spidermonkey_1.8.0: *sm15
spidermonkey_1.8.5:
  # -j  Enable the TraceMonkey tracing JIT
  # -m  Enable the JaegerMonkey method JIT
  bench_flags: ['-jm']

spidermonkey_17:
  # -m/--methodjit  Enable the JaegerMonkey method JIT
  bench_flags: ['-m']
  exceptions_re: *sm_exc
  test262_prelude:
    file: engines/spidermonkey/prelude.js

ssrlive:
  crash_re:
    - *rust_crash_re

starlight:
  bench_suite: ['richards.js1.js']
  crash_re:
    - *rust_crash_re
  exceptions_re:
    - *uncaught_exception_colon_message

starlingmonkey:
  exceptions_re: *sm_exc
  test262_prelude:
    file: engines/spidermonkey/prelude.js
  # TODO: warmup_cmd

sval:
  exceptions_re:
    - *exception_colon_message

tiny-js:
  bench_prelude:
    - 'var console={log: print};'
  bench_suite: ['richards.tiny-js.js']
  errors_re:
    - '^ERROR:(?: Error)?(?P<message>.+?)( at [(]line: [0-9]+, col: [0-9]+[)])*$'

topaz:
  exceptions_re:
    - '^(?P<type>SyntaxError): (?P<message>.+)$'
    - '^Runtime error: (?P<message>.+)$'

topchetoeu:
  crash_re:
    - *java_crash_re
  multiple_scripts_with_shared_realm: true
  errors_re:
    - '^Uncaught Error: (?P<message>.+)$'

twostroke:
  bench_suite: ['richards.es1.js']
  exceptions_re:
    - '.*twostroke-dist/lib/twostroke/([^: ]+/)?(?P<message>[^/ ]*[.]rb:[0-9]+.*)'

ucode:
  bench_suite: ['richards.ucode.js']

v8: &v8
  module_flag: --module
  exceptions_re:
    - '^[^:]+:[0-9]+: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+)$'
  flags:
    # Expose gc() and %-intrinsics for $262 prelude
    - --expose-gc
    - --allow-natives-syntax
    # Enable all completed but not yet enabled JavaScript features
    - --js-staging
    - --harmony
    - --future
    # Enable default-off "in progress / experimental" flags
    - --harmony-shadow-realm
    - --harmony-struct
    - --js-iterator-join
    - --js-decorators
    - --js-source-phase-imports
    - --js-defer-import-eval
    - --js-immutable-arraybuffer
    # TODO: { "shell": "$BINARY --help | grep '^  --js-...'" }
  test262_prelude:
    file: engines/v8/prelude.js

wine: *jscript

xs: &xs
  module_flag: -m
  multiple_scripts_with_shared_realm: true
  exceptions_re:
    - *exception_colon_message

yaji: *fesi

# TODO: yantra - upstream patches needed: "[object Object]"

yavashark:
  flags: ['-i']  # -i Run with the tree-walk-interpreter (more stable)
  exceptions_re:
    - '^Error: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+)$'

zhuzilin:
  exceptions_re:
    - '^(?:Uncaught )?(?P<type>[A-Za-z0-9]*Error): (?P<message>.+?)$'

# --------------------------------------------------------------------
# Runtimes

node:
  console_log: console.log
  # TODO: change extension to .mjs when staging a module script
  module_ext: mjs
  exceptions_re:
    - *exception_colon_message
  test262_flags: ['--expose-gc']
  test262_prelude:
    file: engines/v8/prelude-node.js

bun:
  console_log: console.log
  module_always: true
  exceptions_re:
    *exception_colon_message

deno:
  console_log: console.log
  module_always: true
  stderr_replace_re:
    "error: The module's source code could not be parsed: ": "SyntaxError: "
  exceptions_re:
    - '^(?P<SyntaxError>): (?P<message>.*)$'
    - '^error: Uncaught( [(][^)]+[)])? (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'

# GNOME/Cinnamon JavaScript runtime (SpiderMonkey)
gjs: &gjs
  # TODO: accept list for console_log
  #console_log: ['console.log', 'print']
  stderr_replace_re:
    '.js-Console-Message: [0-9:.]+: ': ''
    '[(].js-console:[0-9]+[)]: ': ''
  exceptions_re:
    - '.*js-CRITICAL ..: [0-9:.]+: JS ERROR: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
  module_flag: --module
  test262_prelude:
    file: engines/spidermonkey/prelude.js

