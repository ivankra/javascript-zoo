# Per-engine configuration for conformance/lib/lib.py
#
# SPDX-FileCopyrightText: 2026 Ivan Krasilnikov
# SPDX-License-Identifier: MIT

_anchors:
  # Most common pattern to report exceptions, e.g. "ReferenceError: x is undefined"
  exception_colon_message: &exception_colon_message '^(?P<type>[A-Za-z]*Error): (?P<message>.+)$'

'42tiny-js':
  exceptions_re:
    - '^(?P<type>[A-Za-z]*Error): (?P<message>.+?)(?: at Line:[0-9]+ Column:[0-9]+)*$'

ant:
  exceptions_re:
    - '^(?P<type>[A-Za-z]*Error): (?P<message>.+?)$'
  test262_prelude: 'var print = console.log.bind(console);'

besen:
  bench_ignore_errors: true
  bench_suite: ['richards.js', 'crypto.js', 'deltablue.js', 'navier-stokes.js']

boa:
  exceptions_re:
    - '^[ ]*[0-9]+: (?P<type>[A-Za-z]*Error): (?P<message>.+?)$'
    - '^Uncaught: (?P<type>[A-Za-z]*Error): (?P<message>.+?)(?: \(.+\))?$'
    - '^Uncaught: "(?P<message>.+?)\]?"$'
  module_flag: --module
  test262_flags: ['--debug-object']  # exposes $boa object
  test262_prelude:
    file: engines/boa/prelude.js

bramblex:
  exceptions_re:
    - *exception_colon_message

brimstone:
  exceptions_re:
    - *exception_colon_message
  flags: ['--no-color', '--annex-b']
  module_flag: --module
  test262_flags: ['--no-color', '--annex-b', '--expose-test-262', '--expose-gc']
  test262_prelude: 'var print = console.log.bind(console);'  # built-in print() only takes strings

castl:
  errors_re:
    - '(?i)(error|unsupported|200 local variables)'

'cesanta-v7':
  bench_suite: ['richards.js']
  multiple_scripts: shared

chakracore:
  exceptions_re:
    - *exception_colon_message
  module_flag: -module
  # test262_flags: ['-Test262']  # requires --test-build

dmdscript:
  bench_prelude:
    - 'var console = {log: println}, print = println;'
    - file: bench/prelude-es5.js
  stderr_replace_re:
    '^1 source files$': ''

duktape:
  exceptions_re:
    - *exception_colon_message

dscriptcpp:
  bench_prelude:
    - 'var console = {log: println}, print = println;'
    - file: bench/prelude-es5.js
  bench_suite: ['richards.es1.js']

'echosoar-jsi':
  bench_transforms: ['hex']

echosoar:
  exceptions_re:
    - '^\S+: JSIError \{ error_type: (?P<type>[A-Za-z]*Error), message: "(?P<message>[^"]*)"'

ejscript:
  exceptions_re:
    - '^ejs: (?P<type>[A-Za-z]*Error): (?P<message>.+)$'

engine262:
  exceptions_re:
    - *exception_colon_message
  module_flag: --module
  test262_prelude:
    file: engines/engine262/prelude.js

eval5:
  exceptions_re:
    - *exception_colon_message

'fastschema-qjs':
  exceptions_re:
    - '^Error: (?P<type>[A-Za-z]*Error): (?P<message>.+)$'

flathead:
  exceptions_re:
    - *exception_colon_message

goja:
  exceptions_re:
    - *exception_colon_message

graaljs:
  exceptions_re:
    - *exception_colon_message
  module_flag: --module
  test262_flags: ['--experimental-options', '--js.test262-mode=true']

escargot:
  module_flag: --module
  multiple_scripts: shared
  exceptions_re:
    - '^Uncaught (?P<type>[A-Za-z]+Error): (?P<message>.+)$'

espruino:
  stdout_replace_re:
    '^([| ]____|[|]  |.*espruino.com|.*G.William|Espruino is Open Source|only by sales).*': ''
  exceptions_re:
    - '^Uncaught (?P<type>[A-Za-z]*Error): (?P<message>.+)$'

hermes: &hermes
  bench_flags: ['-O', '-w']
  console_log: print
  exceptions_re:
    - '^Uncaught (?P<type>[A-Za-z]*Error): (?P<message>.+)$'
  # "file.js:14:3: error: invalid statement encountered."
  errors_re:
    - '[^ ]+:[0-9]+:[0-9]+: error: (?P<message>.+?)[.]?$'

'hermes-v1':
  <<: *hermes
  test262_prelude:
    file: engines/hermes-v1/prelude.js

'iv-lv5':
  exceptions_re:
    # "SyntaxError: file.js:10: SyntaxError: unexpected token class"
    - '^(?P<type>[A-Za-z]*Error): [^ ]+:[0-9]+: \1: (?P<message>.+)$'
    - *exception_colon_message

jerryscript:
  bench_timeout_for_test:
    splay.js: 300
    typescript.js: 3600
  module_flag: --module
  multiple_scripts: shared
  exceptions_re:
    - '^Unhandled exception: (?P<type>[A-Za-z]*Error)(?:: )?(?P<message>.*)$'

jsc:
  console_log: print
  module_flag: -m
  multiple_scripts: shared
  exceptions_re:
    - '^Exception: (?P<type>[A-Za-z]*Error): (?P<message>.+)$'

kiesel:
  module_flag: --module

kjs:
  stderr_replace_re:
    '^LEAK: [0-9]+ KJS::Node$': ''
  exceptions_re:
    - '^\S+ \(line [0-9]+\): (?P<type>[A-Za-z]*Error): (?P<message>.+)$'

kodjodevf:
  exceptions_re:
    - '^\S+: (?P<type>[A-Za-z]*Error): (?P<message>.+)$'

lebjs:
  bench_suite: ['richards.quad-wheel.js']

libjs:
  stdout_replace_re:
    # console.log output gets quoted
    '(?m)^"(.*)"$': '\1'
  stderr_replace_re:
    # Normalize multiline exception
    'Uncaught exception: \n\[([A-Za-z]*Error)\] ': '\1: '
  exceptions_re:
    - '^(?P<type>[A-Za-z]*Error): (?P<message>.+)$'
  flags:
    - --disable-ansi-colors
    - --no-syntax-highlight
    - --disable-source-location-hints
    - --disable-debug-output
    - --raw-strings
  module_flag: --as-module
  test262_flags:
    - --disable-ansi-colors
    - --no-syntax-highlight
    - --disable-source-location-hints
    - --disable-debug-output
    - --raw-strings
    - --use-test262-global

mocha:
  bench_prelude:
    - 'var console = new Object(); console.log = print;'
  bench_suite: ['richards.es1.js']
  errors_re:
    - '^Mocha: '

mquickjs:
  bench_prelude:
    - file: bench/prelude-strict.js
  exceptions_re:
    - '^(?P<type>[A-Za-z]*Error): (?P<message>[^\n]+)'

'modernc-quickjs':
  exceptions_re:
    - '^Error: (?P<type>[A-Za-z]*Error): (?P<message>.+)$'

mujs:
  exceptions_re:
    - *exception_colon_message

narcissus:
  bench_suite: ['richards.js1.js']

nashorn:
  bench_flags: ['--language=es6']
  module_flag: -m
  multiple_scripts: shared
  test262_prelude:
    file: engines/nashorn/prelude.js

ngs:
  bench_prelude:
    - 'var console = {log: print};'
  bench_suite: ['richards.tiny-js.js']

njs:
  bench_prelude:
    - file: bench/prelude-strict.js
  bench_transforms: ['octal']
  module_flag: -m

node:
  exceptions_re:
    - *exception_colon_message
  test262_flags: ['--expose-gc']
  test262_prelude:
    file: engines/v8/prelude-node.js

nova:
  console_log: print
  flags: ['eval', '--no-strict']
  module_flag: --module
  test262_flags: ['eval', '--no-strict', '--expose-internals']
  test262_prelude:
    file: engines/nova/prelude.js
  exceptions_re:
    - '^Uncaught exception: (?P<type>[A-Za-z]*Error): (?P<message>.+)$'
  warnings_re:
    - '^Parse errors:$'
  errors_re:
    - '(^  x |^error:|Error:|TypeError|(?:error|panic|exception|uncaught|mismatch|failed|invalid|incorrect|unsupported|cannot|can''t))'

otto:
  exceptions_re:
    - *exception_colon_message

porffor:
  bench_prelude:
    - 'var print=console.log;'
  bench_suite: ['richards.porffor.js']
  module_flag: --module

'quad-wheel':
  bench_suite: ['richards.quad-wheel.js']

quanta:
  bench_prelude:
    - 'var print=console.log;'
  bench_suite: ['richards.quanta.js']

quickjs: &quickjs
  module_flag: --module
  exceptions_re:
    - *exception_colon_message

quickjs_262:
  # quickjs's run-test262 binary
  <<: *quickjs
  console_log: print  # no console.log() in run-test262
  flags: ['-N']  # -N: run test prepared by test262-harness+eshost

'quickjs-ng': &quickjs_ng
  flags: ['--script']  # misdetects module mode often enough
  module_flag: --module
  exceptions_re:
    - *exception_colon_message

'quickjs-ng_262':
  <<: *quickjs_ng
  console_log: print  # no console.log() in run-test262
  flags: ['-N']  # -N: run test prepared by test262-harness+eshost

qv4:
  bench_transforms: ['octal']
  module_flag: --module
  stderr_replace_re:
    'qt\.qml\.usedbeforedeclared:': ''
  exceptions_re:
    - '^Uncaught exception: (?P<type>[A-Za-z]*Error): (?P<message>.+)$'

rapidus:
  bench_prelude:
    - 'var print=console.log;'
  bench_suite: ['richards.rapidus.js']

'rpython-langjs':
  exceptions_re:
    - '^ERROR in [^:]+: (?P<type>[A-Za-z]*Error): (?P<message>.+)$'
  multiple_scripts: shared

'rust-js':
  exceptions_re:
    - '^\S+: (?P<type>[A-Za-z]*Error)(?:: (?P<message>.+))?$'

sablejs:
  warnings_re:
    - '\[WARN\]'

spidermonkey:
  # "/tmp/x.js:1:3 ReferenceError: x is not defined"
  exceptions_re:
    - '^[^ ]+ (?P<type>[A-Za-z]*Error): (?P<message>.+)$'
  module_flag: --module
  test262_prelude:
    file: engines/spidermonkey/prelude.js

sobek:
  exceptions_re:
    - *exception_colon_message

sophonjs:
  exceptions_re:
    - '^exception (?P<type>[A-Za-z]*Error):(?P<message>.+)$'

sval:
  exceptions_re:
    - *exception_colon_message

'spidermonkey_1.5': &sm15
  # Old SpiderMonkey versions (1.5–1.8.5): need print() + ES5 polyfills.
  bench_prelude:
    - file: bench/prelude-print.js
    - file: bench/prelude-es5.js
  exceptions_re:
    # "/tmp/x.js:1: ReferenceError: x is not defined"
    - '^\S+: (?P<type>[A-Za-z]*Error): (?P<message>.+)$'
    # "uncaught exception: Error: x"
    - '^uncaught exception: (?P<type>[A-Za-z]*Error): (?P<message>.+)$'

'spidermonkey_1.6': *sm15
'spidermonkey_1.7': *sm15
'spidermonkey_1.8.0': *sm15
'spidermonkey_1.8.5':
  <<: *sm15
  bench_flags: ['-jm']

spidermonkey_17:
  bench_flags: ['-m']
  # "/tmp/x.js:1:3 ReferenceError: x is not defined"
  exceptions_re:
    - '^[^ ]+ (?P<type>[A-Za-z]*Error): (?P<message>.+)$'

starlight:
  bench_suite: ['richards.js1.js']

'tiny-js':
  bench_prelude:
    - 'var console={log: print};'
  bench_suite: ['richards.tiny-js.js']
  errors_re:
    - '^ERROR:(?: Error)?(?P<message>.+?)( at [(]line: [0-9]+, col: [0-9]+[)])*$'

topchetoeu:
  multiple_scripts: shared

twostroke:
  bench_suite: ['richards.es1.js']

ucode:
  bench_suite: ['richards.ucode.js']

v8:
  module_flag: --module
  exceptions_re:
    - '^[^:]+:[0-9]+: (?P<type>[A-Za-z]*Error): (?P<message>.+)$'
  test262_flags: ['--harmony', '--future', '--js-staging', '--expose-gc', '--allow-natives-syntax']
  test262_prelude:
    file: engines/v8/prelude.js

xs:
  module_flag: -m
  multiple_scripts: shared
  exceptions_re:
    - *exception_colon_message

yavashark:
  bench_flags: ['-i']
  exceptions_re:
    - '^Error: (?P<type>[A-Za-z]*Error): (?P<message>.+)$'

zhuzilin:
  exceptions_re:
    - '^(?:Uncaught )?(?P<type>[A-Za-z]*Error): (?P<message>.+?)$'
