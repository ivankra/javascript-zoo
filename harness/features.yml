# Mapping of ECMAScript editions to test262 feature tags
#
# References:
#   * https://github.com/tc39/proposals/blob/HEAD/finished-proposals.md
#   * https://github.com/tc39/proposals/blob/main/ecma402/finished-proposals.md
#   * https://github.com/tc39/test262/blob/main/features.txt
#   * https://github.com/boa-dev/boa/blob/main/tests/tester/src/edition.rs
#   * https://github.com/test262-fyi/data/blob/main/controller/generate.js

# Features of the test harness, rather than language features
harness:
  - host-gc-required

es5:
  - caller

es6:
  - __proto__
  - Array.prototype.values
  - ArrayBuffer
  - DataView
  - DataView.prototype.getFloat32
  - DataView.prototype.getFloat64
  - DataView.prototype.getInt16
  - DataView.prototype.getInt32
  - DataView.prototype.getInt8
  - DataView.prototype.getUint16
  - DataView.prototype.getUint32
  - DataView.prototype.setUint8
  - Float32Array
  - Float64Array
  - Int16Array
  - Int32Array
  - Int8Array
  - Map
  - Object.is
  - Promise
  - Proxy
  - Reflect
  - Reflect.construct
  - Reflect.set
  - Reflect.setPrototypeOf
  - Set
  - String.fromCodePoint
  - String.prototype.endsWith
  - String.prototype.includes
  - Symbol
  - Symbol.hasInstance
  - Symbol.isConcatSpreadable
  - Symbol.iterator
  - Symbol.match
  - Symbol.replace
  - Symbol.search
  - Symbol.species
  - Symbol.split
  - Symbol.toPrimitive
  - Symbol.toStringTag
  - Symbol.unscopables
  - TypedArray
  - Uint16Array
  - Uint32Array
  - Uint8Array
  - Uint8ClampedArray
  - WeakMap
  - WeakSet
  - arrow-function
  - class
  - computed-property-names
  - const
  - cross-realm
  - default-parameters
  - destructuring-assignment
  - destructuring-binding
  - for-of
  - generators
  - let
  - new.target
  - proxy-missing-checks
  - rest-parameters
  - super
  - tail-call-optimization
  - template

es2016:
  - Array.prototype.includes
  - exponentiation
  - u180e

es2017:
  - __getter__
  - __setter__
  - Atomics
  - Intl.DateTimeFormat-dayPeriod
  - SharedArrayBuffer
  - async-functions
  - intl-normative-optional

es2018:
  - IsHTMLDDA
  - Promise.prototype.finally
  - Symbol.asyncIterator
  - async-iteration
  - object-rest
  - object-spread
  - regexp-dotall
  - regexp-lookbehind
  - regexp-named-groups
  - regexp-unicode-property-escapes

es2019:
  - Array.prototype.flat
  - Array.prototype.flatMap
  - Object.fromEntries
  - String.prototype.trimEnd
  - String.prototype.trimStart
  - Symbol.prototype.description
  - json-superset
  - optional-catch-binding
  - stable-array-sort
  - stable-typedarray-sort
  - string-trimming
  - well-formed-json-stringify

es2020:
  - BigInt
  - Intl.NumberFormat-unified
  - Intl.RelativeTimeFormat
  - Promise.allSettled
  - String.prototype.matchAll
  - Symbol.matchAll
  - coalesce-expression
  - dynamic-import
  - export-star-as-namespace-from-module
  - for-in-order
  - globalThis
  - import.meta
  - optional-chaining

es2021:
  - AggregateError
  - FinalizationRegistry
  - Intl.DateTimeFormat-datetimestyle
  - Intl.DateTimeFormat-formatRange
  - Intl.DateTimeFormat-fractionalSecondDigits
  - Intl.DisplayNames
  - Intl.ListFormat
  - Intl.Locale
  - Promise.any
  - String.prototype.replaceAll
  - WeakRef
  - align-detached-buffer-semantics-with-web-reality
  - logical-assignment-operators
  - numeric-separator-literal

es2022:
  - Array.prototype.at
  - Intl.DateTimeFormat-extend-timezonename
  - Intl.DisplayNames-v2
  - Intl.Segmenter
  - Object.hasOwn
  - String.prototype.at
  - TypedArray.prototype.at
  - arbitrary-module-namespace-names
  - class-fields-private
  - class-fields-private-in
  - class-fields-public
  - class-methods-private
  - class-static-block
  - class-static-fields-private
  - class-static-fields-public
  - class-static-methods-private
  - error-cause
  - regexp-match-indices
  - top-level-await

es2023:
  - Intl-enumeration  # https://402.ecma-international.org/10.0/index.html#sec-intl.supportedvaluesof
  - Intl.NumberFormat-v3
  - array-find-from-last
  - change-array-by-copy
  - hashbang
  - symbols-as-weakmap-keys

es2024:
  - Atomics.waitAsync
  - String.prototype.isWellFormed
  - String.prototype.toWellFormed
  - array-grouping
  - arraybuffer-transfer
  - promise-with-resolvers
  - regexp-v-flag
  - resizable-arraybuffer

es2025:
  - Float16Array
  - Intl.DurationFormat
  - RegExp.escape
  - import-attributes
  - iterator-helpers
  - json-modules
  - promise-try
  - regexp-modifiers
  - set-methods

es2026:
  - Array.fromAsync
  - Error.isError
  - Intl.Era-monthcode
  - Intl.Locale-info
  - Math.sumPrecise
  - iterator-sequencing
  - json-parse-with-source
  - uint8array-base64
  - upsert

# esnext: everything else
