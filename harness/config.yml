    - '^"(.*)"$': '\1'
  stderr_replace_re:
    - '^(.*SyntaxError.*) \(line: [0-9]+, column: [0-9]+\)$': '\1'
    - '^Uncaught exception: *\n\[([A-Za-z0-9]*Error)\] *': '\1: '
    # test/annexB/language/comments/multi-line-html-close.js
    - '^Uncaught exception: *\nObject\{ message: (.*), toString: \[Function\] * \} *$': 'Test262Error: \1'
    - '^Uncaught exception: *\nObject\{ "message": (.*), "toString": \[Function\] * \} *$': 'Test262Error: \1'
  flags:
    - --raw-strings
    - --use-test262-global
    - { if: 'flags:module', then: '--as-module' }

malbrain:
  stderr_replace_re:
    # error in /tmp/foo.js: line: 49 syntax error, unexpected PLUS
    - '^error in [^:]+: line: [0-9]+ syntax error, (.*)$': 'SyntaxError: \1'

metaes:
