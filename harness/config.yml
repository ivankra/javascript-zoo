# --------------------------------------------------------------------
# Runtimes

node: &node
  <<: *v8
  binary_info:
    version: $BINARY --version | sed -n 's/^v\([0-9]\)/\1/p'
    v8_version: $BINARY -e "console.log(process.versions.v8)"
  # Tell Node to treat .js files in the module tree as ES modules.
  # Helps to fix a few dynamic import tests.
  package_json: '{"type":"module"}'
  # Pass the script via stdin instead of a file path as a command-line arg.
  # For Node.js, this makes it run the script at true global scope rather than
  # wrapped in a CJS function scope. Applies to non-module tests only.
  # Script argument will be changed to "-", CWD to script's directory.
  redirect_stdin: true
  # TODO: check if prelude causes these
  flaky_attempts: 3
  flaky_tests: &node_flaky_tests
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-add.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-and.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-compareExchange.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-exchange.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-or.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-store.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-sub.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-xor.js

node_exp:
  <<: *node
  flags: *v8_exp_flags

bun:
  binary_info:
    version: $BINARY --version
  console_log: console.log
  errors_re:
    - '^error: (?P<message>.+)$'

deno:
  binary_info:
    version: $BINARY --version | sed -n 's/^deno \([^ ]*\).*/\1/p'
    v8_version: $BINARY --version | sed -n 's/^v8 //p'
  console_log: console.log
  package_json: '{"type":"module"}'
  harness_replace_re:
    - *test262_harness_patches
    # deno aborts on redefinition of isPrimitive() in harness/testTypedArray.js
    - '^function isPrimitive\(val\) \{\n  return.*\n\}': ''
    # global scope is broken in strict mode, this === undefined
    - '^  if \(this.setTimeout === undefined\) \{$': '  if (globalThis.setTimeout === undefined) {'
  stderr_replace_re:
    - "error: The module's source code could not be parsed: ": "SyntaxError: "
    - 'error: Uncaught (?:\(in promise\) )?Test262Error \{\n *message: (.)(.*)\1\n\}': 'Test262Error: \2'
    - ' at file://[^: ]+:[0-9]+:[0-9]+$': ''
  errors_re:
    - '^(?P<SyntaxError>): (?P<message>.*)$'
    - '^error: Uncaught( [(][^)]+[)])? (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
  sloppy_via_function: true  # needs Function() wrapper to switch to sloppy mode
  flags:
    - --v8-flags=--allow-natives-syntax,--expose-gc  # note: only allows one --v8-flags
  prelude: *v8_prelude

# GNOME/Cinnamon JavaScript runtime (SpiderMonkey)
gjs: &gjs
  binary_info:
    version: $BINARY --version | sed 's/^[a-z]* //'
    spidermonkey_version: $BINARY --jsversion | sed 's/^JavaScript-C//'
  console_log: ['console.log', 'print']
  stderr_replace_re:
    - '.js-Console-Message: [0-9:.]+: ': ''
    - '[(].js-console:[0-9]+[)]: ': ''
  errors_re:
    - '.*js-CRITICAL ..: [0-9:.]+: JS ERROR: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
  flags:
    - { if: 'flags:module', then: '--module' }
  prelude:
    - file: engines/spidermonkey/prelude.js

