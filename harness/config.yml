    - '.*twostroke-dist/[^:]*[.]rb:[0-9]+: warning: .*': ''
  errors_re:
    - ".*twostroke-dist/lib/twostroke/([^: ]+/)?parser[.]rb:[0-9]+:in `error!': (?P<type>SyntaxError): (?P<message>.+)$"
    - '.*twostroke-dist/lib/twostroke/([^: ]+/)?(?P<message>[^/ ]*[.]rb:[0-9]+.*)'

ucode:
  bench_suite: ['richards.ucode.js']
  console_log: print
  stderr_replace_re:
    - "^Syntax error: ": "SyntaxError: "

v8: &v8
  console_log: ['console.log', 'print']
  stderr_replace_re:
    - 'V8 is running with experimental features enabled. Stability and security will suffer.': ''
    - '^[^:]+:[0-9]+: Error: Unhandled Promise.$': ''
  errors_re:
    - '^[^:]+:[0-9]+: (?P<type>[A-Za-z0-9]+Error): (?P<message>.+)$'
  v8_and_node_flags: &v8_and_node_flags
    # Expose gc() and %-intrinsics for $262 prelude
    - --expose-gc
    - --allow-natives-syntax
    # Enable all completed but not yet enabled JavaScript features
    # - --js-staging  # missing in node 20
    - --harmony
    - --future
    # Enable every disabled --harmony-* / --js-* flag that the binary advertises
    # (in progress / experimental flags). Snippet for both node and d8.
    - shell: |
        $BINARY --help --v8-options 2>&1 | \
          sed -n '/type: bool/{x;G;s/\n/ /;p;};h' | \
          grep 'default: --no-' | \
          sed -En 's/^ *(--(harmony|js)-[^ ]+) .*/\1/p'
  # See https://github.com/v8/v8/blob/main/test/test262/testcfg.py (_get_files_params/_get_suite_flags/FEATURE_FLAGS)
  flags:
    - *v8_and_node_flags
    # d8-specific flags
    - --ignore-unhandled-promises  # test/built-ins/Promise/any/ctx-ctor.js
    - --no-arguments  # test/language/eval-code/direct/func-decl-a-following-parameter-is-named-arguments-declare-arguments-and-assign.js
    - { if: 'flags:module', then: '--module' }
    - { if: 'features:CanBlockIsFalse', then: '--no-can-block' }
  prelude: &v8_and_node_prelude
    - file: engines/v8/prelude.js
    - file: engines/v8/prelude-agent.js
    # These intrinsics don't work well with try/eval() wrapper and may not be
    # available on older binaries, so include them conditionally if test requires.
    - { if: 'features:IsHTMLDDA', file: 'engines/v8/prelude-IsHTMLDDA.js' }
    - { if: 'features:source-phase-imports', file: 'engines/v8/prelude-AbstractModuleSource.js' }

wine: *jscript

xs: &xs
  console_log: print
  flags:
