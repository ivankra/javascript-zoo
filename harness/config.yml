  bench_transforms: ['octal']
  flags:
    - { if: 'flags:module', then: '-m' }
  errors_re:
    - '^Thrown: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.+)$'

nocturnejs:
