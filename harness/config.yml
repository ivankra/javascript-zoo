    - '^ParserNotImplemented: (.*?)(?: \([0-9]+:[0-9]+\)\.?)?$': 'SyntaxError: \1'
    - '^(.*SyntaxError.*) \([0-9]+:[0-9]+\)\.?$': '\1'

libjs: &libjs
  console_log: ['console.log', 'print']
  stdout_replace_re:
    - '^(.*SyntaxError.*) \(line: [0-9]+, column: [0-9]+\)$': '\1'
