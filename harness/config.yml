# Per-engine configuration: customization knobs on how to work with each engine
# such as command-line flags, test262 options, regexes to parse output, etc.
#
# See harness/config.py for schema and parser.
#
# Lookup key is binary's basename.
#
# This file is shared between benchmarking and conformance testing scripts,
# read at start up to find configuration for the binary to be run.
#
# The config is merged at runtime with sidecar metadata (<binary>.json file)
# and the key without _<variant> suffix, if any, in this order:
#  * config.yml[default] (lowest priority defaults)
#  * config.yml[<engine>]
#  * config.yml[<engine>_<variant>] (higher priority per-variant overrides)
#  * <engine>_<variant>.json (highest priority overrides)
#
# SPDX-FileCopyrightText: 2026 Ivan Krasilnikov
# SPDX-License-Identifier: MIT

# Any overrides to the defaults for all engines can go here
default:
  # Per-run timeout in seconds
  timeout_sec: 60
  # GitHub runners only have 4G/core and we need some buffer to avoid worker VM deaths
  # V8 can pass whole test suite with 1.5G
  memory_limit_mb: 3584
  #flaky_tests:
  #- test/built-ins/Atomics/wait/bigint/no-spurious-wakeup-no-operation.js
  #- test/built-ins/Atomics/wait/bigint/no-spurious-wakeup-on-add.js

.constants:
  # Common pattern to report exceptions
  # e.g. "ReferenceError: x is undefined", "Test262Error: Expected SameValue(«1», «0») to be true"
  # Do not tighten to "Error: ..." to avoid matching some non-fatal warnings.
  exc1: &exception_colon_message '^(?P<type>[A-Za-z0-9]+Error): (?P<message>.+)$'
  # Second common pattern, also used by most of this repo's wrappers
  exc2: &uncaught_exception_colon_message '^Uncaught (?:exception: )?(?P<type>[A-Za-z0-9]*Error):? *(?P<message>.*)$'
  # Crash strings from language runtimes
  gola: &go_crash_re '^(?P<message>panic: .*|fatal error: stack overflow)$'
  java: &java_crash_re '^(?P<message>Exception in thread "[^"]+" java.*)'
  rust: &rust_crash_re "^(?P<message>(thread '[^']+'( [(][0-9]+[)])? panicked at .*))$"
  rust_norm: &rust_crash_norm_re
    "thread '([^']+)' \\([0-9]+\\) panicked at": "thread '\\1' panicked at"

42tiny-js:
  console_log: ['console.log', 'print']
  errors_re:
    - "^Error: uncaught exception: '(?P<type>[A-Za-z0-9]*Error): ?(?P<message>.*?)' at Line:[0-9]+ Column:[0-9]+$"
    - '^(?P<type>[A-Za-z0-9]*Error): ?(?P<message>.*?)(?: at Line:[0-9]+ Column:[0-9]+)*$'
  stdout_replace_re:
    - '^> ': ''

ant:
  console_log: console.log
  errors_re:
    - *exception_colon_message
  prelude:
    - code: 'var print = console.log.bind(console);'

asynkron:
  errors_re:
    - *uncaught_exception_colon_message
    - *exception_colon_message

bali:
  console_log: console.log
  stdout_replace_re:
    - 'Log ': ''
  errors_re:
    - '^WARN *parser.* (?P<message>parsing error.*)'

besen:
  console_log: ['console.log', 'print']
  bench_ignore_errors: true
  bench_suite: ['richards.js', 'crypto.js', 'deltablue.js', 'navier-stokes.js']
  errors_re:
    - *exception_colon_message
    - '^ThrowException: (?P<message>.+?)$'

boa:
  console_log: console.log
  crash_re:
    - *rust_crash_re
  stdout_replace_re:
    - 'Uncaught Error: Test262Error {\n *message: "(?P<message>.*)"': 'Uncaught Error: Test262Error: \1'
  stderr_replace_re:
    - *rust_crash_norm_re
  errors_re:
    #  0: SyntaxError: unexpected token 'using', primary expression at line 52, col 13
    - '^[ ]*[0-9]+: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+?)$'
    - '^Uncaught: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+?)(?: \(.+\))?$'
    - '^Uncaught: "(?P<message>.+?)\]?"$'
    # Uncaught Error: ReferenceError: x is not defined
    - '^Uncaught Error: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*?)$'
    # Uncaught Error: Test262Error {
    - '^Uncaught Error: (?P<type>[A-Za-z0-9]*Error) [{]'
    # Uncaught Error: "Function Unimplemented]"
    - '^Uncaught Error: "(?P<message>.+?)\]?"$'
    # Uncaught Error: RuntimeLimitError: reached the maximum number of recursive calls on this execution
    - '^Uncaught Error: (?P<message>.+)$'
  flags:
    # Add --test262-object if available for the built-in $262 object,
    # with fallback to --debug-object + prelude.
    - shell: $BINARY --help | egrep -o '(--debug-object|--test262-object)' | tail -1
    - { if: 'flags:CanBlockIsFalse', then: '--no-can-block' }
    - { if: 'flags:module', then: '--module' }
  prelude:
    - file: engines/boa/prelude.js

bramblex:
  console_log: ['console.log', 'print']
  errors_re:
    - *uncaught_exception_colon_message
    - '^Uncaught exception: (?P<message>.+?)$'
  stdout_replace_re:
    - '^Uncaught exception: \[Error\] \[object Object\], (.*) 未定义$': 'Uncaught exception: ReferenceError: \1'

brimstone: &brimstone
  console_log: console.log
  crash_re:
    - *rust_crash_re
  stderr_replace_re:
    - *rust_crash_norm_re
  errors_re:
    - *exception_colon_message
  flags:
    - --no-color
    - --annex-b
    - --expose-test-262
    - --expose-gc
    - { if: 'flags:module', then: '--module' }
  # built-in print() with --expose-test-262 only takes strings and
  # doesn't print to stdout/stderr
  prelude:
    - code: 'globalThis.print = console.log.bind(console);'
  exit_code_for_test262_error: 1

carakan:
  stdout_replace_re:
    '^(Opera JavaScript shell.*|Setting address space limit.*|done!|-+)$': ''
    '^(Compilation time|Execution time|(Major|Minor) collection|  Tracing|  Sweeping|  Number|Total in collection|(Total|Peak) bytes allocated|Total external bytes) *:.*$': ''
    '^Syntax error at line [0-9]+: (.*)$': 'Uncaught exception: SyntaxError: \1'
    '^Uncaught exception: Error: (.*)$': 'Uncaught exception: Test262Error: \1'
  errors_re:
    - *uncaught_exception_colon_message

castl:
  console_log: console.log
  stdout_replace_re:
    # Shorten long/path/to/file.lua:123 -> file.lua:123.
    - '([ (<])(?:\.\.\.)?/??(?:[^/\s]+/)*([^/\s]+[.]lua:[0-9]+)': '\1\2'
    - "^attempt to call global '([^']+)' \\(a nil value\\)$": 'ReferenceError: \1 is not defined'
    - "^attempt to call method '([^']+)' \\(a nil value\\)$": 'TypeError: \1 is not a function'
    - '^undefined is not a function$': 'TypeError: undefined is not a function'
    # luajit: { message: 'x' }
    # stack traceback:
    # 	[C]: in function 'error'
    # 	/zoo/dist/arm64/castl-dist/castl/jssupport.lua:41: in function '_throw'
    - "^luajit: \\{ message: '(.*)' \\}\\nstack traceback:\n\t\\[C\\]: in function 'error'\n\t.*jssupport.lua.*": 'Test262Error: \1'
  stderr_replace_re:
    - "^SyntaxError: Couldn't transpile JS code: Error: (.*)$": 'SyntaxError: \1'
  errors_re:
    - '^luajit: (?P<type>[A-Za-z0-9]+Error)(: )?(?P<message>.*)$'
    - '^luajit: [^ ]*[.]lua:[0-9]+: (?P<message>.*)$'
    - '^luajit: [^ ]*\.js\.lua:[0-9]+: (?P<message>.*)$'
    - '^luajit: [^ ]*\.js\.lua:[0-9]+: (?P<message>function at line [0-9]+ has more than 200 local variables)$'
    - '[^ ]*\.js\.lua:[0-9]+: (?P<message>attempt to .*)$'
    - *exception_colon_message
  requires_tmp_staging: true  # writes .lua alongside .js files => requires writeable location

cesanta-elk:
  console_log: ['console.log', 'print']
  stdout_replace_re:
    - '^"(.*)"$': '\1'
    - "^Error: ERROR: '(.+?)' not found$": 'ReferenceError: \1 not found'
    - '^Error: ERROR: bad expr$': 'SyntaxError: bad expr'
  errors_re:
    - *exception_colon_message
    - '^Error: ERROR: (?P<message>.+?)$'

cesanta-mjs:
  console_log: print
  stdout_replace_re:
    - '^MJS error: parse error at line [0-9]+: ': 'SyntaxError: '
    - '^MJS error: \[(.+?)\] is not defined$': 'ReferenceError: \1 is not defined'
  errors_re:
    - *exception_colon_message
    - '^MJS error: (?P<message>.+?)$'

cesanta-v7:
  console_log: print
  bench_suite: ['richards.js']
  multiple_scripts_with_shared_realm: true
  errors_re:
    - '^Exec error [^:]+: (?P<type>SyntaxError|InternalError)$'
    - '^Exec error [^:]+: "(?P<type>Test262Error): ?(?P<message>.*)"$'
    - '^Exec error [^:]+: (?P<type>[A-Za-z0-9]*Error): ?(?P<message>.*)$'
    - *exception_colon_message
    - '^Exec error [^:]+: "?(?P<message>.+?)"?$'
  stderr_replace_re:
    # Exec error [/tmp/file.js]: "Syntax error at line 41 col 4:\n    break block;\n   ^"
    - '^(Exec error [^:]+): "Syntax error at line [0-9]+ col [0-9]+.*': '\1: SyntaxError'
    - '^(Exec error [^:]+): "Internal error"': '\1: InternalError'
    - '^(Exec error [^:]+): "\[(.+?)\] is not defined"$': '\1: ReferenceError: \2 is not defined'

chakracore: &chakracore
  console_log: ['console.log', 'print', 'WScript.Echo']
  errors_re:
    - *exception_colon_message
  flags:
    # - { if: 'test262', then: '-Test262' }  # requires --test-build
    - { if: 'flags:module', then: '--module' }
  ignore_sigabrt: true
  timeout_sec: 10

continuum:
  console_log: console.log
  stdout_replace_re:
    - "Property '@@@[a-zA-Z0-9]+' is not a function": "Property is not a function"
  errors_re:
    - *uncaught_exception_colon_message
  timeout_sec: 10

delskayn:
  console_log: console.log
  stdout_replace_re:
    - '^Uncaught SyntaxError: error: ': 'Uncaught SyntaxError: '
  errors_re:
    - '^Uncaught (?P<type>[A-Za-z0-9]*Error): (?P<message>.*)$'
    - *uncaught_exception_colon_message
  memory_limit_mb: 2048
  memory_addr_limit_mb: 3072

derkjs:
  console_log: console.log
  flags: ['-r']
  stderr_replace_re:
    - '\x1b\[[0-9;]*m': ''
    - '^Syntax Error ': 'SyntaxError '
  errors_re:
    - '^SyntaxError \[ln [0-9]+, col [0-9]+\]:\s*\n\tnote: (?P<message>.*)$'

dmdscript:
  console_log: println
  stderr_replace_re:
    - '^1 source files$': ''
    # dmdscript.script.ScriptException@engine/source/dmdscript/script.d(66): /tmp/file.js(11) : Error: found '[' instead of statement
    - '^dmdscript.script.ScriptException@[^ :]+: /[^():]+[(][0-9]+[)] : Error: (?P<message>.+)$': 'SyntaxError: \g<message>'
    - "^dmdscript.script.ScriptException@[^ :]+: Variable (?P<message>.+ is not defined)$": 'ReferenceError: \g<message>'
    - '^dmdscript.script.ScriptException@[^ :]+: (?P<type>TypeError|RangeError)$': '\g<type>:'
    - '^dmdscript.script.ScriptException@[^ :]+: (?P<type>Test262Error): ?(?P<message>.*)$': '\g<type>: \g<message>'
  errors_re:
    - '^(?P<type>[A-Za-z0-9]+Error): ?(?P<message>.*)$'
    - '^(dmdscript.script.ScriptException|undead.regexp.RegExpException|std.utf.UTFException)@[^ :]+: (?P<message>.+)$'
  prelude:
    - code: 'var console = {log: println}, print = println;'
    - { if: 'bench', file: 'harness/prelude-es5.js' }

dscriptcpp:
  bench_suite: ['richards.es1.js']
  console_log: println
  stdout_replace_re:
    - 'Exception:\n': 'Exception: '
  stderr_replace_re:
    - 'Exception:\n': 'Exception: '
    - '(Digital Mars DMDScript.*|http://www.digitalmars.com|Compiled by.*|written by .*|1 source files)': ''
  errors_re:
    - '^Exception: ([^ ()]*\([0-9]+\) : Error: )?(?P<message>.+)$'
  prelude:
    - code: 'var console = {log: println}, print = println;'
    - { if: 'bench', file: 'harness/prelude-es5.js' }
  memory_limit_mb: 2048
  memory_addr_limit_mb: 3072

duktape: &duktape
  console_log: ['console.log', 'print']
  errors_re:
    - *exception_colon_message

echosoar:
  bench_transforms: ['hex']
  console_log: console.log
  crash_re:
    - *rust_crash_re
  stderr_replace_re:
    - *rust_crash_norm_re
  errors_re:
    - *uncaught_exception_colon_message
    - '^\S+: JSIError \{ error_type: (?P<type>[A-Za-z0-9]*Error), message: "(?P<message>[^"]*)"'

ejscript:
  console_log: print
  crash_re:
    - '^(?P<message>Assertion .*, failed at [^:]+:[0-9]+)'
  stderr_replace_re:
    - '^ejs: Error: /[^ :]+[.]js: [0-9]+: (?P<message>Unexpected input .+)$': 'SyntaxError: \g<message>'
  errors_re:
    - '^ejs: (?P<type>[A-Za-z0-9]*Error): /[^ :]+[.]js: [0-9]+: (?P<message>.+)$'
    - '^ejs: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+)$'
    - '^(?P<message>Cannot allocate memory block) of size [0-9,]+ bytes'
  memory_limit_mb: 2048
  memory_addr_limit_mb: 3072

engine262:
  console_log: ['console.log', 'print']
  stdout_replace_re:
    - "^'(.*)'$": '\1'
  stderr_replace_re:
    # Test262Error { message: 'x' }
    - "^Test262Error [{] message: '(.*)' [}]$": 'Test262Error: \1'
  errors_re:
    - *exception_colon_message
    - *uncaught_exception_colon_message  # main.js wrapper
  flags:
    - --features=all
    - { if: 'flags:module', then: '--module' }
  timeout_sec: 10
  # test262_filter: "~(dir:test/built-ins/RegExp/property-escapes/generated)"  # too slow

epimetheus:
  console_log: ['console.log', 'print']
  stdout_replace_re:
    - 'Welcome to Epimetheus.': ''
    - '(?m)^Syntax error: (.+)$': 'SyntaxError: \1'
    - '(?m)^Reference error: (.+)$': 'ReferenceError: \1'
  errors_re:
    - *exception_colon_message
  timeout_sec: 3

escargot:
  console_log: print
  flags:
    - { if: 'flags:CanBlockIsFalse', then: '--canblock-is-false' }
    - { if: 'flags:module', then: '--module' }
  multiple_scripts_with_shared_realm: true
  errors_re:
    - '^Script parsing error: (?P<type>SyntaxError): Line [0-9]+: (?P<message>.*)$'
    - '^Uncaught (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*?):?$'

espruino:
  console_log: ['console.log', 'print']
  stdout_replace_re:
    - '^([| ]____|[|]  |.*espruino.com|.*G.William|Espruino is Open Source|only by sales).*': ''
    - '^>(.)\1{50,}': ''
    - '^> *$': ''
  errors_re:
    - '^Uncaught (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'

eval5:
  console_log: ['console.log', 'print']
  errors_re:
    - *exception_colon_message
    - *uncaught_exception_colon_message

fastschema-qjs:
  console_log: ['console.log', 'print']
  crash_re:
    - *go_crash_re
  errors_re:
    - *uncaught_exception_colon_message
  flags:
    - { if: 'flags:module', then: '--module' }
  timeout_sec: 10

fesi: &fesi
  console_log: writeln
  stderr_replace_re:
    - '^Syntax error ': 'SyntaxError: '
    - '^Lexical error ': 'SyntaxError: '
    - "('(?:toDateString|toLocaleDateString|toTimeString|toLocaleTimeString)' is not defined) for object .*": '\1'
  errors_re:
    - '^(?P<type>SyntaxError): (?P<message>.+)$'
    - '^Runtime error (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
    - '^(?P<message>Runtime error .+)$'
    - '^(?P<message>.*near line [0-9]+, column [0-9]+)$'
  crash_re:
    - *java_crash_re

flathead:
  console_log: ['console.log', 'print']
  errors_re:
    - *exception_colon_message
  memory_limit_mb: 2048
  memory_addr_limit_mb: 3072

goja: &goja
  # While our wrapper provides print(), standard goja main doesn't
  console_log: console.log
  crash_re:
    - *go_crash_re
  errors_re:
    - *exception_colon_message
    - *uncaught_exception_colon_message
    - '^(?P<type>[A-Za-z0-9]*Error): [^:]+[.]js: Line (?P<line>[0-9]+):[0-9]+ (?P<message>.+)$'
  stderr_replace_re:
    # goja_nodejs/console prefixes console messages with a timestamp
    - '^20[0-9][0-9]/[0-9][0-9]/[0-9][0-9] [0-9][0-9]:[0-9][0-9]:[0-9][0-9] ': ''
  flags:
    # Only for our sobek wrapper (goja doesn't implement ES modules).
    # Optional: it would also recognize .mjs.
    - if: flags:module
      then:
        shell: $BINARY --help 2>&1 | grep -o -- -module

graaljs:
  console_log: ['console.log', 'print']
  errors_re:
    - *exception_colon_message
  flags:
    - --experimental-options
    - --js.global-arguments=false  # required for some test262 tests
    - --js.performance
    - --js.shebang
    - --js.test262-mode
    # Enable experimental javascript features
    - shell: |
        $BINARY --help:all | egrep -o '(--js.class-fields|--js.import-attributes|--js.private-fields-in|--js.regexp-match-indices|--js.regexp-unicode-sets|--js.source-phase-imports|--js.async-context|--js.async-iterator-helpers|--js.atomics-wait-async|--js.iterator-helpers|--js.new-set-methods|--js.shadow-realm|--js.temporal|--js.top-level-await|--js.error-cause)'
    - { if: 'flags:CanBlockIsFalse', then: '--js.agent-can-block=false' }
    - { if: 'flags:module', then: '--module' }  # must be last - takes path as parameter

hako:
  console_log: console.log
  crash_re:
    - *go_crash_re
  errors_re:
    - *uncaught_exception_colon_message
    - '^  "name": "(?P<type>[A-Za-z0-9]*Error)",?$'  # hako_wamr/hako-cli
  timeout_sec: 10

hako_wasmtime_go:
  flags:
    - { if: 'flags:module', then: '--module' }

hermes: &hermes
  bench_flags:
    - -O  # Expensive optimizations
    - -w  # Disable all warnings
    - if: test262
      then:
        shell: $BINARY -help-list-hidden | grep -o [-]test262  # Increase compliance with test262
  console_log: print  # hermes main only has print()
  stderr_replace_re:
    # Syntax errors: "file.js:14:3: error: invalid statement encountered."
    - '([^ ]+[.]js:[0-9]+:[0-9]+: error: .*)': 'SyntaxError \1'
    # es5/strict.this-undefined-in-function.js - dumps both ok and fail markers
    - '[^ ]+[.]js:[0-9]+:[0-9]+: warning: the variable "console" was not declared.*\n *console.log\("[^"]+"\);': ''
  errors_re:
    - '^Uncaught (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.+)$'
    - '(?P<type>(SyntaxError)) [^ ]+[.]js:(?P<line>[0-9]+):[0-9]+: error: (?P<message>.+?)[.]?$'
    - '^[^ ]+[.]js:[0-9]+:[0-9]+: error: (?P<message>.+?)[.]?$'
  prelude:
    - file: engines/hermes/prelude.js

hermes-v1: *hermes

iv-lv5:
  console_log: ['console.log', 'print']
  errors_re:
    # "SyntaxError: file.js:10: SyntaxError: unexpected token class"
    - '^(?P<type>[A-Za-z0-9]*Error): [^ ]+:[0-9]+: \1: (?P<message>.+)$'
    - *exception_colon_message
  memory_limit_mb: 2048
  memory_addr_limit_mb: 3072

je-perl:
  console_log: ['console.log', 'print']
  errors_re:
    - *uncaught_exception_colon_message

jerryscript: &jerryscript
  console_log: print
  bench_timeout_for_test:
    splay.js: 300
    typescript.js: 3600
  flags:
    - --test262-object
    - { if: 'flags:module', then: '--module' }
  multiple_scripts_with_shared_realm: true
  errors_re:
    - '^Unhandled exception: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'

jint: &jint
  console_log: ['console.log', 'print']
  stdout_replace_re:
    # REPL prints last expression's value to stdout
    - '^(null|undefined|\[object Promise\])$': ''
  errors_re:
    - *uncaught_exception_colon_message
  flags:
    - { if: 'flags:module', then: '--module' }
  timeout_sec: 20

jispy:
  console_log: ['console.log', 'print']

js2py:
  console_log: console.log
  stdout_replace_re:
    - "^'(.*)'$": '\1'
    - '^"(.*)"$': '\1'
    - "KeyError: b'.*$": 'KeyError'
  stderr_replace_re:
    - '^Traceback \(most recent call last\):$': ''
    - '^  File ".*$",?': ''
    - '^    .*$': ''
    - "^During handling of the above exception, another exception occurred:$": ''
    - "KeyError: b'.*$": ''
    - '(?m)^.*: FutureWarning: .*(?:\n  .*)?$': ''
  errors_re:
    - '^js2py.internals.simplex.JsException: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
    - *exception_colon_message
    - '^(?P<message>KeyError)$'

jsc: &jsc
  console_log: print
  multiple_scripts_with_shared_realm: true
  errors_re:
    - '^Exception: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+)$'
  flags:
    # Enable experimental JavaScript features advertised by the binary
    - shell: |
        $BINARY --options 2>&1 | grep -v Wasm | sed -En 's/^ *(use.*)=false.* \.\.\. *(Enable|Expose).*/--\1=true/p'
    - { if: 'flags:CanBlockIsFalse', then: '--can-block-is-false' }
    - { if: 'flags:module', then: '-m' }

jsish:
  console_log: console.log
  stderr_replace_re:
    # test.js:1:   "42",  or  typeof.null.js:11:  "...",
    - '^\S+[.]js:[0-9]+: +"([^"]*)", *$': '\1'
    # file.js:14: parse: :13.6: error: msg  ->  file.js:14: SyntaxError: msg
    # file.js:2: parse: /full/path.js:2.7: error: msg  ->  file.js:2: SyntaxError: msg
    - ': parse: (?:[^ ]+\.[0-9]+: error: )?(?:syntax error, )?': ': SyntaxError: '
    # Drop bare "ERROR:" summary line emitted after parse errors
    - '^ERROR: *$': ''
