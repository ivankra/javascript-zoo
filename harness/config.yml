Jint.Repl: *jint
YantraJS: *yantra
bs: *brimstone
ch: *chakracore
cjs-console: *gjs
cjs: *gjs
d8: *v8
duk: *duktape
gjs-console: *gjs
javascriptcore: *jsc
jerry: *jerryscript
jsshell: *spidermonkey
mqjs: *mquickjs
qjs: *quickjs
run-test262: *quickjs
serenity-js: *libjs
sm: *spidermonkey
xst: *xs
