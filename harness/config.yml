    - *rust_crash_norm_re
  stdout_replace_re:
    - '^"(.*)"$': '\1'
    - '^Interpreter: Undefined': ''
  errors_re:
    - '^Error: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+)$'

zhuzilin:
  console_log: console.log
  stdout_replace_re:
    - '^ParserError: ?(.*)$': 'SyntaxError: \1'
  errors_re:
    - '^(?:Uncaught )?(?P<type>[A-Za-z0-9]*Error): (?P<message>.+?)$'

zuqe:
  console_log: ['console.log', 'print']
  flags:
    - { if: 'flags:module', then: '-m' }

# --------------------------------------------------------------------
# Runtimes

node:
  console_log: console.log
  errors_re:
    - *exception_colon_message
  flags: *v8_and_node_flags
  prelude: *v8_and_node_prelude

bun:
  console_log: console.log
  #module_always: true
  errors_re:
    *exception_colon_message

deno:
  console_log: console.log
  #module_always: true
  stderr_replace_re:
    - "error: The module's source code could not be parsed: ": "SyntaxError: "
  errors_re:
    - '^(?P<SyntaxError>): (?P<message>.*)$'
    - '^error: Uncaught( [(][^)]+[)])? (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'

# GNOME/Cinnamon JavaScript runtime (SpiderMonkey)
gjs: &gjs
  # TODO: accept list for console_log
  console_log: ['console.log', 'print']
  stderr_replace_re:
    - '.js-Console-Message: [0-9:.]+: ': ''
    - '[(].js-console:[0-9]+[)]: ': ''
  errors_re:
    - '.*js-CRITICAL ..: [0-9:.]+: JS ERROR: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
  flags:
    - { if: 'flags:module', then: '--module' }
  prelude:
    - file: engines/spidermonkey/prelude.js

