# Config for both d8 shell and node.
# Upstream test262 flags: see _get_files_params/_get_suite_flags/FEATURE_FLAGS in
# https://github.com/v8/v8/blob/main/test/test262/testcfg.py
v8: &v8
  console_log: console.log  # d8 has both, but nodejs only has console.log()
  stderr_replace_re:
    - 'V8 is running with experimental features enabled. Stability and security will suffer.': ''
    - '^[^:]+:[0-9]+: Error: Unhandled Promise.$': ''
    # /tmp/t262-w6popv9x/2746545-does-not-invoke-array-setters.sloppy.js:450
    #     throw new Test262Error("Setter on Array.prototype called");
    #     ^
    # Test262Error: Setter on Array.prototype called
    # (Use `node --trace-uncaught ...` to show where the exception was thrown)
    # Node.js v25.8.1
    - '^[^:]+:[0-9]+\n *throw new Test262Error.*\n *\^\nTest262Error': 'Test262Error'
    - '^\(Use `node --trace-uncaught ...` to show where the exception was thrown\)': ''
    - '^Node.js v[0-9.]+$': ''
  errors_re:
    - '^[^:]+:[0-9]+: (?P<type>[A-Za-z0-9]+Error): (?P<message>.+)$'
  flags:
    # Enable every disabled --js-*/--harmony*/--future flag that the binary
    # advertises: completed but not yet enabled JavaScript features, as well
    # as in progress / experimental features.
    # Snippet for both d8 shell and node (`--help --v8-options` is critical).
    - shell: |
        $BINARY --help --v8-options 2>&1 | \
          sed -n '/type: bool/{x;G;s/\n/ /;p;};h' | \
          grep 'default: --no-' | \
          sed -En 's/^ *(--js-[^ ]+|--harmony[^ ]*|--future) .*/\1/p'
    # d8-specific flags
    - shell: |
        if $BINARY --help 2>&1 | grep -q '^ *d8 '; then
          # test/built-ins/Promise/any/ctx-ctor.js
          echo --ignore-unhandled-promises;
          # test/language/eval-code/direct/func-decl-a-following-parameter-is-named-arguments-declare-arguments-and-assign.js
          echo --no-arguments;
        fi
    # Expose %-intrinsics for $262 prelude
    - --allow-natives-syntax
    # Only expose GC for tests that require it, otherwise it breaks
    # test/built-ins/ShadowRealm/prototype/evaluate/globalthis-config-only-properties.js
    - if: features:host-gc-required
      then: --expose-gc
    - if: flags:CanBlockIsFalse
      then:
        # Note: not advertised in --help
        shell: "if $BINARY --help 2>&1 | grep -q '^ *d8 '; then echo --no-can-block; fi"
    - if: flags:module
      then:
        # Not supported by node - we rely on renaming test as *.mjs instead
        shell: "if $BINARY --help 2>&1 | grep -q '^ *d8 '; then echo --module; fi"
  prelude:
    - file: engines/v8/prelude.js
    - file: engines/v8/prelude-agent.js
    # These intrinsics don't work well with try/eval() wrapper and may not be
    # available on older binaries, so include them conditionally if test requires.
    - if: features:IsHTMLDDA
      code: "$262.IsHTMLDDA = %GetUndetectable();"
    - if: features:source-phase-imports
      code: "$262.AbstractModuleSource = %GetAbstractModuleSource();"

wine: *jscript

xs: &xs
  console_log: print
  flags:
    - { if: 'flags:module', then: '-m', else: '-s' }
  multiple_scripts_with_shared_realm: true
  stderr_replace_re:
    - '^Error: unhandled rejection$': ''
  errors_re:
    - *exception_colon_message

yaji: *fesi

yantra: &yantra
  console_log: console.log
  stdout_replace_re:
    - '^\[object Object\]$': ''
    - '^[0-9]+/[0-9]+/20[0-9][0-9] [0-9]+:[0-9]+:[0-9]+.[AP]M$': ''  # uses \u202f
  stderr_replace_re:
    - '^Unhandled exception. YantraJS.Core.JSException: Test262Error: *(.*)$': 'Test262Error: \1'
  ignore_sigabrt: true  # raises SIGABRT on exceptions
  memory_limit_mb: 2048
  memory_addr_limit_mb: 3072

yrm006:
  console_log: print
  stdout_replace_re:
    # This engine sometimes emits unstable bare integers instead of failure text
    # for broken bitwise/print paths; keep conformance output deterministic.
    - '^-?[0-9]+$': ''
  memory_limit_mb: 2048
  memory_addr_limit_mb: 3072

yavashark:
  console_log: console.log
  crash_re:
    - *rust_crash_re
  flags: ['-i']  # -i Run with the tree-walk-interpreter (more stable)
  stderr_replace_re:
    - *rust_crash_norm_re
  stdout_replace_re:
    - '^"(.*)"$': '\1'
    - '^Interpreter: Undefined': ''
    - '^Error: Uncaught: \{ "name": "Test262Error", "message": "(.*)" \}$': 'Error: Test262Error: \1'
  errors_re:
    - '^Error: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+)$'

zhuzilin:
  console_log: console.log
  stdout_replace_re:
    - '^ParserError: ?(.*)$': 'SyntaxError: \1'
  errors_re:
    - '^(?:Uncaught )?(?P<type>[A-Za-z0-9]*Error): (?P<message>.+?)$'

zuqe:
  console_log: ['console.log', 'print']
  flags:
    - { if: 'flags:module', then: '-m' }

# --------------------------------------------------------------------
# Runtimes

node: *v8

bun:
  console_log: console.log
  #module_always: true
  errors_re:
    *exception_colon_message

deno:
  console_log: console.log
  #module_always: true
  stderr_replace_re:
    - "error: The module's source code could not be parsed: ": "SyntaxError: "
  errors_re:
    - '^(?P<SyntaxError>): (?P<message>.*)$'
    - '^error: Uncaught( [(][^)]+[)])? (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'

# GNOME/Cinnamon JavaScript runtime (SpiderMonkey)
gjs: &gjs
  # TODO: accept list for console_log
  console_log: ['console.log', 'print']
  stderr_replace_re:
    - '.js-Console-Message: [0-9:.]+: ': ''
    - '[(].js-console:[0-9]+[)]: ': ''
  errors_re:
    - '.*js-CRITICAL ..: [0-9:.]+: JS ERROR: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
  flags:
    - { if: 'flags:module', then: '--module' }
  prelude:
    - file: engines/spidermonkey/prelude.js

