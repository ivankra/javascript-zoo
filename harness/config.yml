  errors_re:
    - '^Mocha: [^,]+\.m?js, line [0-9]+: (?P<type>SyntaxError)$'
    - '^Mocha: [^,]+\.m?js, line [0-9]+: (?P<message>.+?):?$'
    - '^Mocha: (?P<message>.+)$'
  fix_assert_throws: True

modernc-quickjs:
