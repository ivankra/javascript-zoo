  errors_re:
    - '^[^:]+\.m?js:[0-9]+(:[0-9]+)? (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
    - '^java.lang.RuntimeException: (?P<message>.*)$'
  # https://github.com/openjdk/nashorn/blob/main/src/org.openjdk.nashorn/share/classes/org/openjdk/nashorn/tools/Shell.java#L98
  exit_code_for_syntax_error: 101   # COMPILATION_ERROR
