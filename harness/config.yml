    "^InternalError: Throw: { message: '(.*)' }$": 'InternalError: Throw: Test262Error: \1'
    '^InternalError: Throw: String\("Test262: This statement should not be ev...<truncated>"\)': 'Test262: This statement should not be evaluated.'
  errors_re:
    - '^InternalError: Throw: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'

otto:
