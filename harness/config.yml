# Config for both d8 shell and node.
# Upstream test262 flags: see _get_files_params/_get_suite_flags/FEATURE_FLAGS in
# https://github.com/v8/v8/blob/main/test/test262/testcfg.py
v8: &v8
  binary_info:
    version: $BINARY --version | sed -n 's/^V8 version \([^ ]*\).*/\1/p; s/^v\([0-9]\)/\1/p'
  console_log: console.log  # d8 has both, but nodejs only has console.log()
  stderr_replace_re:
    - 'V8 is running with experimental features enabled. Stability and security will suffer.': ''
    - '^[^:]+:[0-9]+: Error: Unhandled Promise.$': ''
    # /tmp/t262-rpfes8s9/t262-3172501.10.4.3-1-101gs.js:432
    #     throw "'this' had incorrect value!";
    #     ^
    # 'this' had incorrect value!
    - "^/[^: ]+\\.m?js:[0-9]+\\n *throw ['\"].*\n *\\^\\n(.+)$": 'Uncaught exception: \1'
    # /tmp/t262-w6popv9x/2746545-does-not-invoke-array-setters.sloppy.js:450
    #     throw new Test262Error("Setter on Array.prototype called");
    #     ^
    # Test262Error: Setter on Array.prototype called
    - '^/[^: ]+\.m?js:[0-9]+\n *throw new ([A-Za-z0-9]+Error).*\n *\^\n\1': '\1'
    - '^/[^: ]+\.m?js:[0-9]+\n *throw new (Error).*\n *\^\n\1': 'Uncaught exception: \1'
    # /tmp/t262-4q3f7xzg/t262-3172173.prop-desc.sloppy.js:262
    #   throw new Test262Error(message);
    #   ^
    # Test262Error {
    #   message: '$1 setter Expected SameValue(«function set $1() { [native code] }», «undefined») to be true'
    # }
    # Test262Error { message: 'obj should have an own property decodeURI' }
    - "^Test262Error \\{[\\n ]+message: '(.*)'[\\n ]+\\}\n": 'Test262Error: \1'
    # (Use `node --trace-uncaught ...` to show where the exception was thrown)
    - '^\(Use `node --trace-uncaught ...` to show where the exception was thrown\)': ''
    # Node.js v25.8.1
    - '^Node.js v[0-9.]+$': ''
  errors_re:
    - '^[^:]+:[0-9]+: (?P<type>[A-Za-z0-9]+Error): (?P<message>.+)$'
  flags: &v8_flags
    - shell: |
        if $BINARY --help 2>&1 | grep -q '^ *d8 '; then  # d8-specific flags
          # test/built-ins/Promise/any/ctx-ctor.js
          echo --ignore-unhandled-promises;
          # test/language/eval-code/direct/func-decl-a-following-parameter-is-named-arguments-declare-arguments-and-assign.js
          echo --no-arguments;
        elif $BINARY --help 2>&1 | fgrep -q 'nodejs.org'; then  # Node-specific flags
          # Module autodetection breaks a few tests like test/language/global-code/export.js
          echo --no-experimental-detect-module
        fi
    # Expose %-intrinsics for $262 prelude
    - --allow-natives-syntax
    # Only expose GC for tests that require it, otherwise it breaks
    # test/built-ins/ShadowRealm/prototype/evaluate/globalthis-config-only-properties.js
    # TODO: verify
    - if: features:host-gc-required
      then: --expose-gc
    - if: flags:CanBlockIsFalse
      then:
        # Note: only supported by d8 and not advertised in its --help
        shell: "if $BINARY --help 2>&1 | grep -q '^ *d8 '; then echo --no-can-block; fi"
    - if: flags:module
      then:
        # Not supported by node - we rely on renaming test as *.mjs instead
        shell: "if $BINARY --help 2>&1 | grep -q '^ *d8 '; then echo --module; fi"
  prelude: &v8_prelude
    - file: engines/v8/prelude.js
    - file: engines/v8/prelude-agent.js
    # These intrinsics don't work well with try/eval() wrapper and may not be
    # available on older binaries, so include them conditionally if test requires.
    - if: features:IsHTMLDDA
      code: "$262.IsHTMLDDA = %GetUndetectable();"
    - if: features:source-phase-imports
      code: "$262.AbstractModuleSource = %GetAbstractModuleSource();"

# V8 with experimental flags.
# Usage: run test262.py with `-c v8_exp` flag to select this config.
v8_exp: &v8_exp
  <<: *v8
  flags: &v8_exp_flags
    - *v8_flags
    # Check what flags the binary advertises, filter for default disabled flags
    # and enable every one of: --future, --harmony, --harmony-*, --js-*
    # (completed but not yet enabled JavaScript features, as well
    # as in progress / experimental features.)
    # Snippet is for both d8 and node, `--help --v8-options` is critical:
    # node needs --v8-options, d8 needs --help and ignores --v8-options.
    # {"shell": "..."} blocks behave like $(...) of bash - harness will
    # run the command and tokenize its output (see EngineConfig.resolve_flags).
    - shell: |
        $BINARY --help --v8-options 2>&1 | \
          sed -n '/type: bool/{x;G;s/\n/ /;p;};h' | \
          grep 'default: --no-' | \
          sed -En 's/^ *(--future|--harmony[^ ]*|--js-[^ ]+) .*/\1/p'

