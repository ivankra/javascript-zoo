# Per-engine configuration: customization knobs on how to work with each engine
# such as command-line flags, test262 options, regexes to parse output, etc.
#
# See EngineConfig dataclass in harness/config.py for schema.
#
# This file is shared between benchmarking and conformance testing scripts,
# read at start up to find configuration for the binary to be run.
#
# Lookup key is based on binary's basename or can be specified explicitly
# with -c/--config flag, e.g. `test262.py -c v8_exp node` to run node
# using v8_exp config (V8 with experimental flags on).
#
# The config is merged at runtime (by replacing whole value, no deep merge)
# from key-value pairs defined in these places in order:
#  * EngineConfig's defaults
#  * config.yml[default] - overrides to the defaults for all engines
#  * config.yml[<engine>] - standard engine config. Engine name is derived
#    from binary's basename by stripping _* and .* suffixes.
#  * config.yml[<basename>] - higher priority overrides for specific variants.
#
# SPDX-FileCopyrightText: 2026 Ivan Krasilnikov
# SPDX-License-Identifier: MIT

# Any overrides to the defaults for all engines can go here
default:
  # Timeout per run/scenario (a single test run in either strict or sloppy mode).
  timeout_sec: 60
  # Maximum RSS size before a process will get killed by OOM watchdog.
  # 4G is sufficient for major engines to pass test262: V8 needs 1.5G, JSC 2.8G.
  # GitHub runners provide 16G RAM / 4C + swap; we also use --shuffle against clustered OOMs.
  memory_limit_mb: 4096
  # Common error patterns.
  # These will get appended to errors_re at runtime as lower-priority error patterns.
  common_errors_re:
    # e.g. "ReferenceError: x is undefined", "Test262Error: Expected SameValue(«1», «0») to be true"
    # Do not tighten to "Error: ..." to avoid matching some non-fatal warnings.
    - '^(?P<type>[A-Za-z0-9]+Error): (?P<message>.+)$'
    # Second common pattern, also used by most of this repo's wrappers
    - '^Uncaught (?:exception: )?(?P<type>[A-Za-z0-9]*Error):? *(?P<message>.*)$'
    - '^Uncaught exception: (?P<message>.+)$'
  # Patches to test262 harness code
  harness_replace_re: &test262_harness_patches
    # Downgrade ES6 syntax in assert.js / propertyHelper.js
    # https://github.com/tc39/test262/pull/5006
    - '^ *assert\(false, \`Actual argument \[\$\{actual\}\] shouldn''t be primitive\. \$\{message\}\`\);$': '    assert(false, "Actual argument [" + actual + "] shouldn''t be primitive. " + String(message));'
    - '^ *assert\(false, \`Expected argument \[\$\{expected\}\] shouldn''t be primitive\. \$\{message\}\`\);$': '    assert(false, "Expected argument [" + expected + "] shouldn''t be primitive. " + String(message));'
    - '^ *assert\(false, \`Actual \$\{format\(actual\)\} and expected \$\{format\(expected\)\} should have the same contents\. \$\{message\}\`\);$': '  assert(false, "Actual " + format(actual) + " and expected " + format(expected) + " should have the same contents. " + String(message));'
    - '^ *return \`\[\$\{Array\.prototype\.map\.call\(arrayLike, String\)\.join\('', ''\)\}\]\`;$': '  return "[" + Array.prototype.map.call(arrayLike, String).join(", ") + "]";'
    - '^ *return typeof JSON !== "undefined" \? JSON\.stringify\(value\) : \`"\$\{value\}"\`;$': '      return typeof JSON !== "undefined" ? JSON.stringify(value) : ''"'' + value + ''"'';'
    - '^ *return \`\$\{value\}n\`;$': '      return String(value) + "n";'
    - '^ *"Invalid descriptor field: " \+ names\[i\],$': '      "Invalid descriptor field: " + names[i]'
    # Fix harness/sm/non262-strict-shell.js (testLenientAndStrict is broken in strict mode)
    # https://github.com/tc39/test262/pull/5008
    - '^ *eval\(code\);$': '      Function(''code'', ''eval(code)'')(code);'
    - '^ *eval\(code\);$': '        Function(''code'', ''eval(code)'')(code);'
    - '^ *return eval\(code\) === value;$': '        return Function(''code'', ''return eval(code)'')(code) === value;'
    # Fix harness/sm/non262-expressions-shell.js (broken in strict mode as well)
    # test/staging/sm/expressions/destructuring-array-default-*.js: "ReferenceError: 'a' is not defined"
    - '^ *var c;$': '        var a, c;'

# Common constants to be referenced later in the config via YAML anchors.
# Top-level keys starting with a dot are ignored when validating the config.
.constants:
  # Tighter settings for OOM-prone engines that cause GitHub runners to die
  oom_prone: &oom_prone
    - memory_addr_limit_mb: 4096  # ulimit -v (kernel enforced, mallocs would start failing)
    - memory_limit_mb: 3072       # RSS limit enforced by OOM watchdog
    - max_jobs: 2                 # instead of 4 (cpu count) on standard GitHub runners
  # Crash strings from language runtimes
  gola: &go_crash_re '^(?P<message>panic: .*|fatal error: stack overflow)$'
  java: &java_crash_re '^(?P<message>Exception in thread "[^"]+" java.*)'
  rust: &rust_crash_re "^(?P<message>(thread '[^']+'( [(][0-9]+[)])? panicked at .*))$"
  rust_norm: &rust_crash_norm_re
    "thread '([^']+)' \\([0-9]+\\) panicked at": "thread '\\1' panicked at"

42tiny-js:
  console_log: ['console.log', 'print']
  errors_re:
    - "^Error: uncaught exception: '(?P<type>[A-Za-z0-9]*Error): ?(?P<message>.*?)' at Line:[0-9]+ Column:[0-9]+$"
    - '^(?P<type>[A-Za-z0-9]*Error): ?(?P<message>.*?)(?: at Line:[0-9]+ Column:[0-9]+)*$'
  stdout_replace_re:
    - '^> ': ''

ant:
  console_log: console.log
  prelude:
    - code: 'var print = console.log.bind(console);'
  stderr_replace_re:
    # /tmp/foo.js:232:5
    # 229 |   assert.throws(
    #         ^^^^^^
    - '^[^ :]+\.m?js:[0-9]+(:[0-9]+)?(\n *[0-9]+ *[|].*)+\n *\^+': '<SOURCE>'
    - '<SOURCE>\nError: ': 'Test262Error: '

asynkron:
  timeout_sec: 20
  exit_code_may_be_syntax_error: 1
  stderr_replace_re:
    - ' at line [0-9]+, column [0-9]+$': ''

bali:
  console_log: console.log
  stdout_replace_re:
    - '^Log ': ''
    # WARN   parser[1244:12] parsing error (Other): expected expression, got nothing instead
    - '^WARN +parser\[[0-9:]+\] (parsing error.*)': 'SyntaxError: \1'

besen:
  console_log: ['console.log', 'print']
  bench_ignore_errors: true
  bench_suite: ['richards.js', 'crypto.js', 'deltablue.js', 'navier-stokes.js']
  stderr_replace_re:
    - '^An unhandled exception occurred at \$[0-9A-F]+:$': 'Unhandled exception'
    - '^Exception object is not a valid class\.$': ''
    - '^  \$[0-9A-F]+$': ''
    - '^Runtime error [0-9]+ at \$[0-9A-F]+$': 'Runtime error'
  errors_re:
    - '^ThrowException: (?P<message>.+?)$'

boa:
  console_log: console.log
  crash_re:
    - *rust_crash_re
  stdout_replace_re:
    - 'Uncaught Error: Test262Error {\n *message: "(?P<message>.*)"': 'Uncaught Error: Test262Error: \1'
    - ' \(/[^(): ]+\.m?js:[0-9]+:[0-9]+\)$': ''  # drop line number info from messages
  stderr_replace_re:
    - *rust_crash_norm_re
    - ' at line [0-9]+, col [0-9]+$': ''
  errors_re:
    #  0: SyntaxError: unexpected token 'using', primary expression at line 52, col 13
    - '^[ ]*[0-9]+: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+?)$'
    - '^Uncaught: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+?)(?: \(.+\))?$'
    - '^Uncaught: "(?P<message>.+?)\]?"$'
    # Uncaught Error: ReferenceError: x is not defined
    - '^Uncaught Error: (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*?)$'
    # Uncaught Error: Test262Error {
    - '^Uncaught Error: (?P<type>[A-Za-z0-9]*Error) [{]'
    # Uncaught Error: "Function Unimplemented]"
    - '^Uncaught Error: "(?P<message>.+?)\]?"$'
    # Uncaught Error: RuntimeLimitError: reached the maximum number of recursive calls on this execution
    - '^Uncaught Error: (?P<message>.+)$'
  flags:
    # Add --test262-object if available for the built-in $262 object,
    # with fallback to --debug-object + prelude.
    - shell: $BINARY --help | egrep -o '(--debug-object|--test262-object)' | tail -1
    - { if: 'flags:CanBlockIsFalse', then: '--no-can-block' }
    - { if: 'flags:module', then: '--module' }
  prelude:
    - file: engines/boa/prelude.js

bramblex:
  console_log: ['console.log', 'print']
  stdout_replace_re:
    - '^(.*SyntaxError.*) \([0-9]+:[0-9]+\)$': '\1'
    - '^Uncaught exception: \[Error\] \[object Object\], (.*) 未定义$': 'Uncaught exception: ReferenceError: \1'

brimstone: &brimstone
  console_log: console.log
  crash_re:
    - *rust_crash_re
  stderr_replace_re:
    - *rust_crash_norm_re
  errors_re:
    - '^Error: (?P<message>.+)$'
  flags:
    - --no-color
    - --annex-b
    - --expose-test-262
    - --expose-gc
    - { if: 'flags:module', then: '--module' }
  # built-in print() with --expose-test-262 only takes strings and
  # doesn't print to stdout/stderr
  prelude:
    - code: 'globalThis.print = console.log.bind(console);'
  exit_code_may_be_test262_error: 1

carakan:
  stdout_replace_re:
    '^(Opera JavaScript shell.*|Setting address space limit.*|done!|-+)$': ''
    '^(Compilation time|Execution time|(Major|Minor) collection|  Tracing|  Sweeping|  Number|Total in collection|(Total|Peak) bytes allocated|Total external bytes) *:.*$': ''
    '^Syntax error at line [0-9]+: (.*)$': 'Uncaught exception: SyntaxError: \1'
    '^Uncaught exception: Error: (.*)$': 'Uncaught exception: Test262Error: \1'

castl:
  console_log: console.log
  stdout_replace_re:
    # Shorten long/path/to/file.lua:123 -> file.lua:123.
    - '([ (<])(?:\.\.\.)?/??(?:[^/\s]+/)*([^/\s]+[.]lua:[0-9]+)': '\1\2'
    - "^attempt to call global '([^']+)' \\(a nil value\\)$": 'ReferenceError: \1 is not defined'
    - "^attempt to call method '([^']+)' \\(a nil value\\)$": 'TypeError: \1 is not a function'
    - '^undefined is not a function$': 'TypeError: undefined is not a function'
    # luajit: { message: 'x' }
    # stack traceback:
    # 	[C]: in function 'error'
    # 	/zoo/dist/arm64/castl-dist/castl/jssupport.lua:41: in function '_throw'
    - "^luajit: \\{ message: '(.*)' \\}\\nstack traceback:\n\t\\[C\\]: in function 'error'\n\t.*jssupport.lua.*": 'Test262Error: \1'
    - '(?ms)^(luajit: .*)\nstack traceback:\n.*$': '\1'
  stderr_replace_re:
    - 'Error: Line [0-9]+: ': 'Error: '
    - "^SyntaxError: Couldn't transpile JS code: Error: (.*)$": 'SyntaxError: \1'
  errors_re:
    - '^luajit: (?P<type>[A-Za-z0-9]+Error)(: )?(?P<message>.*)$'
    - '^luajit: [^ ]*[.]lua:[0-9]+: (?P<message>.*)$'
    - '^luajit: [^ ]*\.m?js\.lua:[0-9]+: (?P<message>.*)$'
    - '^luajit: [^ ]*\.m?js\.lua:[0-9]+: (?P<message>function at line [0-9]+ has more than 200 local variables)$'
    - '[^ ]*\.m?js\.lua:[0-9]+: (?P<message>attempt to .*)$'
  requires_tmp_staging: true  # writes .lua alongside .js files => requires writeable location

cesanta-elk:
  console_log: ['console.log', 'print']
  stdout_replace_re:
    - '^"(.*)"$': '\1'
  stderr_replace_re:
    - '^Error: ERROR: (parse error|bad expr)$': 'SyntaxError'
    - "^Error: ERROR: '(.+?)' not found$": 'ReferenceError: \1'
  errors_re:
    - '^Error: ERROR: (?P<message>.+?)$'

cesanta-mjs:
  console_log: print
  stdout_replace_re:
    - '^MJS error: parse error at line [0-9]+: ': 'SyntaxError: '
    - '^MJS error: \[(.+?)\] is not defined$': 'ReferenceError: \1 is not defined'
  errors_re:
    - '^MJS error: (?P<message>.+?)$'

cesanta-v7:
  console_log: print
  bench_suite: ['richards.js']
  multiple_scripts_with_shared_realm: true
  errors_re:
    - '^Exec error [^:]+: (?P<type>SyntaxError|InternalError)$'
    - '^Exec error [^:]+: "(?P<type>Test262Error): ?(?P<message>.*)"$'
    - '^Exec error [^:]+: (?P<type>[A-Za-z0-9]*Error): ?(?P<message>.*)$'
    - '^Exec error [^:]+: "?(?P<message>.+?)"?$'
  stderr_replace_re:
    # Exec error [/tmp/file.js]: "Syntax error at line 41 col 4:\n    break block;\n   ^"
    - '^(Exec error [^:]+): "Syntax error at line [0-9]+ col [0-9]+.*': '\1: SyntaxError'
    - '^(Exec error [^:]+): "Internal error"': '\1: InternalError'
    - '^(Exec error [^:]+): "\[(.+?)\] is not defined"$': '\1: ReferenceError: \2 is not defined'

chakracore: &chakracore
  console_log: ['console.log', 'print', 'WScript.Echo']
  errors_re:
    - '^Error: (?P<message>.+)$'
  flags:
    - if: test262
      then:
        # requires binary built with --test-build/-DCMAKE_BUILD_TYPE=RelWithDebInfo
        shell: "if $BINARY -? 2>&1 | grep -q Test262; then echo -Test262; fi"
    - if: features:host-gc-required
      then: -CollectGarbage
    - if: flags:module
      then: --module
  prelude:
    - file: engines/chakracore/prelude.js

continuum:
  console_log: console.log
  stdout_replace_re:
    - "Property '@@@[a-zA-Z0-9]+' is not a function": "Property is not a function"
  timeout_sec: 10

delskayn:
  console_log: console.log
  crash_re:
    - *rust_crash_re
  stderr_replace_re:
    - *rust_crash_norm_re
  stdout_replace_re:
    - '^Uncaught SyntaxError: error: ': 'Uncaught SyntaxError: '
  <<: *oom_prone

derkjs:
  console_log: console.log
  flags: ['-r']
  stderr_replace_re:
    - '\x1b\[[0-9;]*m': ''
    - '^Syntax Error \[ln [0-9]+, col [0-9]+\]:$': 'SyntaxError'
    - '^Syntax Error ': 'SyntaxError '
  errors_re:
    - '^SyntaxError \[ln [0-9]+, col [0-9]+\]:\s*\n\tnote: (?P<message>.*)$'
    - '^ERROR: *(?P<message>Uncaught error):?$'

dmdscript:
  console_log: println
  stderr_replace_re:
    - '^1 source files$': ''
    # dmdscript.script.ScriptException@engine/source/dmdscript/script.d(66): /tmp/file.js(11) : Error: found '[' instead of statement
    - '^dmdscript.script.ScriptException@[^ :]+: (?:/[^():]+|[^():]+)[(][0-9]+[)] : Error: (?P<message>.+)$': 'SyntaxError: \g<message>'
    - "^dmdscript.script.ScriptException@[^ :]+: Variable (?P<message>.+ is not defined)$": 'ReferenceError: \g<message>'
    - '^dmdscript.script.ScriptException@[^ :]+: (?P<type>TypeError|RangeError)$': '\g<type>:'
    - '^dmdscript.script.ScriptException@[^ :]+: (?P<type>Test262Error): ?(?P<message>.*)$': '\g<type>: \g<message>'
  errors_re:
    - '^(?P<type>[A-Za-z0-9]+Error): ?(?P<message>.*)$'
    - "^(dmdscript.script.ScriptException|undead.regexp.RegExpException|std.utf.UTFException|undead.dateparse.DateParseError|std.format.FormatException)@[^ :]+: (?P<message>(?:';'|[^;])+)"
  prelude:
    - code: 'var console = {log: println}, print = println;'
    - { if: 'bench', file: 'harness/prelude-es5.js' }

dscriptcpp:
  bench_suite: ['richards.es1.js']
  console_log: println
  stdout_replace_re:
    - 'Exception:\n': 'Exception: '
  stderr_replace_re:
    - 'Exception:\n': 'Exception: '
    - '(Digital Mars DMDScript.*|http://www.digitalmars.com|Compiled by.*|written by .*|1 source files)': ''
  errors_re:
    - '^Exception: ([^ ()]*\([0-9]+\) : Error: )?(?P<message>.+)$'
  prelude:
    - code: 'var console = {log: println}, print = println;'
    - { if: 'bench', file: 'harness/prelude-es5.js' }
  <<: *oom_prone

duktape: &duktape
  console_log: ['console.log', 'print']
  stderr_replace_re:
    - '^(SyntaxError: .*) \(line [0-9]+\)$': '\1'
  errors_re:
    - '^Error: (?P<message>.+)$'

dowdiness:
  console_log: console.log
  flags:
    - { if: 'flags:module', then: '--module' }

echosoar:
  bench_transforms: ['hex']
  console_log: console.log
  crash_re:
    - *rust_crash_re
  stderr_replace_re:
    - *rust_crash_norm_re
  errors_re:
    - '^\S+: JSIError \{ error_type: (?P<type>[A-Za-z0-9]*Error), message: "(?P<message>[^"]*)"'
  prelude:
    - code: 'var print = console.log.bind(console);'

ejscript:
  console_log: print
  crash_re:
    - '^(?P<message>Assertion .*, failed at [^:]+:[0-9]+)'
  stderr_replace_re:
    #  ^ ejs: Error: /tmp/foo.js: 227: Unexpected input ""
    - '^\s*\^?\s*ejs: Error: /[^ :]+\.m?js: [0-9]+: (?P<message>Unexpected input.+|Cannot parse.+|Cannot compile.+|Cannot find.+|Unknown directive.*|.*not yet implemented.*|Illegal.+)$': 'SyntaxError: \g<message>'
    - ' starting on line [0-9]+': ''
  errors_re:
    - '\s*\^?\s*ejs: (?P<type>[A-Za-z0-9]*Error): /[^ :]+\.m?js: [0-9]+: (?P<message>.+)$'
    - '\s*\^?\s*ejs: (?P<type>[A-Za-z0-9]*Error): (?P<message>.+)$'
    - '^(?P<message>Cannot allocate memory block) of size [0-9,]+ bytes'
  <<: *oom_prone

engine262:
  console_log: ['console.log', 'print']
  stdout_replace_re:
    # Undo overquoting by console.log() (vs print):
    # console.log('hello "world"') => 'hello \"world\"'
    # print('hello "world"')       => hello "world"
    - "^'(.*)\\\\\"(.*)\\\\\"(.*)'$": '\1"\2"\3'
    - "^'(.*)\\\\\"(.*)\\\\\"(.*)'$": '\1"\2"\3'
    - "^'(.*)'$": '\1'
    # Test262Error { message: 'obj should have an own property decodeURI' }
    - "^(?:Uncaught exception: )?Test262Error \\{[\\n ]+message: '(.*)'[\\n ]+\\}\n": 'Test262Error: \1'
  stderr_replace_re:
    # Test262Error { message: 'obj should have an own property decodeURI' }
    - "^(?:Uncaught exception: )?Test262Error \\{[\\n ]+message: '(.*)'[\\n ]+\\}\n": 'Test262Error: \1'
  errors_re:
    # Error: Internal error: .LoadRequestedModules() returned a pending promise
    - '^Error: (?P<message>Internal error: .*)$'
  flags:
    - --features=all
    - { if: 'flags:module', then: '--module' }
  timeout_sec: 10

epimetheus:
  console_log: ['console.log', 'print']
  stdout_replace_re:
    - 'Welcome to Epimetheus.': ''
    - '(?m)^Syntax error: (.+)$': 'SyntaxError: \1'
    - '(?m)^Reference error: (.+)$': 'ReferenceError: \1'
  fix_assert_throws: True
  timeout_sec: 10

escargot:
  console_log: print
  flags:
    - { if: 'flags:CanBlockIsFalse', then: '--canblock-is-false' }
    - { if: 'flags:module', then: '--module' }
  multiple_scripts_with_shared_realm: true
  errors_re:
    - '^Script parsing error: (?P<type>SyntaxError): Line [0-9]+: (?P<message>.*)$'
    - '^Uncaught (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*?):?$'
  # Retry known flaky tests couple times on failures
  flaky_attempts: 3
  flaky_tests: &flaky_atomics
    - test/built-ins/Atomics/notify/count-defaults-to-infinity-missing.js
    - test/built-ins/Atomics/notify/negative-count.js
    - test/built-ins/Atomics/notify/notify-one.js
    - test/built-ins/Atomics/notify/notify-renotify-noop.js
    - test/built-ins/Atomics/notify/notify-two.js
    - test/built-ins/Atomics/notify/undefined-index-defaults-to-zero.js
    - test/built-ins/Atomics/wait/bigint/no-spurious-wakeup-no-operation.js
    - test/built-ins/Atomics/wait/bigint/no-spurious-wakeup-on-add.js
    - test/built-ins/Atomics/wait/bigint/no-spurious-wakeup-on-and.js
    - test/built-ins/Atomics/wait/bigint/no-spurious-wakeup-on-store.js
    - test/built-ins/Atomics/wait/bigint/no-spurious-wakeup-on-sub.js
    - test/built-ins/Atomics/wait/bigint/waiterlist-block-indexedposition-wake.js
    - test/built-ins/Atomics/wait/bigint/was-woken-before-timeout.js
    - test/built-ins/Atomics/wait/false-for-timeout-agent.js
    - test/built-ins/Atomics/wait/nan-for-timeout.js
    - test/built-ins/Atomics/wait/no-spurious-wakeup-no-operation.js
    - test/built-ins/Atomics/wait/wait-index-value-not-equal.js
    - test/built-ins/Atomics/wait/waiterlist-order-of-operations-is-fifo.js
    - test/built-ins/Atomics/waitAsync/bigint/false-for-timeout-agent.js
    - test/built-ins/Atomics/waitAsync/bigint/negative-timeout-agent.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-add.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-and.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-compareExchange.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-exchange.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-or.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-store.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-sub.js
    - test/built-ins/Atomics/waitAsync/bigint/no-spurious-wakeup-on-xor.js
    - test/built-ins/Atomics/waitAsync/bigint/symbol-for-timeout-throws-agent.js
    - test/built-ins/Atomics/waitAsync/bigint/undefined-for-timeout-agent.js
    - test/built-ins/Atomics/waitAsync/bigint/undefined-for-timeout.js
    - test/built-ins/Atomics/waitAsync/bigint/undefined-index-defaults-to-zero-agent.js
    - test/built-ins/Atomics/waitAsync/bigint/value-not-equal-agent.js
    - test/built-ins/Atomics/waitAsync/bigint/waiterlist-block-indexedposition-wake.js
    - test/built-ins/Atomics/waitAsync/implicit-infinity-for-timeout.js
    - test/built-ins/Atomics/waitAsync/nan-for-timeout-agent.js
    - test/built-ins/Atomics/waitAsync/no-spurious-wakeup-on-and.js
    - test/built-ins/Atomics/waitAsync/no-spurious-wakeup-on-compareExchange.js
    - test/built-ins/Atomics/waitAsync/no-spurious-wakeup-on-exchange.js
    - test/built-ins/Atomics/waitAsync/no-spurious-wakeup-on-store.js
    - test/built-ins/Atomics/waitAsync/no-spurious-wakeup-on-sub.js
    - test/built-ins/Atomics/waitAsync/no-spurious-wakeup-on-xor.js
    - test/built-ins/Atomics/waitAsync/returns-result-object-value-is-promise-resolves-to-ok.js
    - test/built-ins/Atomics/waitAsync/returns-result-object-value-is-promise-resolves-to-timed-out.js
    - test/built-ins/Atomics/waitAsync/undefined-for-timeout-agent.js
    - test/built-ins/Atomics/waitAsync/undefined-for-timeout.js
    - test/built-ins/Atomics/waitAsync/undefined-index-defaults-to-zero-agent.js
    - test/built-ins/Atomics/waitAsync/waiterlist-block-indexedposition-wake.js

espruino:
  console_log: ['console.log', 'print']
  stdout_replace_re:
    - '^([| ]____|[|]  |.*espruino.com|.*G.William|Espruino is Open Source|only by sales).*': ''
    - '^>(.)\1{50,}': ''
    - '^> *$': ''
    - 'Espruino 2v[0-9]+ LINUX': ''
    - 'Press Ctrl-C again to exit': ''
  errors_re:
    - '^Uncaught (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'

eval5:
  console_log: ['console.log', 'print']
  stdout_replace_re:
    - '^(.*SyntaxError.*) \([0-9]+:[0-9]+\)$': '\1'
    - ' \[[0-9]+:[0-9]+\]$': ''

fastschema-qjs:
  console_log: ['console.log', 'print']
  crash_re:
    - *go_crash_re
  flags:
    - { if: 'flags:module', then: '--module' }
  timeout_sec: 10

fesi: &fesi
  console_log: writeln
  stderr_replace_re:
    # Syntax error detected Encountered "*" at line 226, column 9.
    - '^Syntax error (detected )?': 'SyntaxError: '
    - '^Lexical error ': 'SyntaxError: '
    - "('(?:toDateString|toLocaleDateString|toTimeString|toLocaleTimeString)' is not defined) for object .*": '\1'
    - "^(Keyword '[^']+' reserved for future extension .*)$": 'SyntaxError: \1'
    - ' at line [0-9]+, column [0-9]+\.$': ''
    - ' near line [0-9]+, column [0-9]+, after .*?$': ''
  errors_re:
    - '^(?P<type>SyntaxError): (?P<message>.+)$'
    - '^Runtime error (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.*)$'
    - '^(?P<message>Runtime error .+)$'
    - '^(?P<message>.*near line [0-9]+, column [0-9]+)$'
  crash_re:
    - *java_crash_re

flathead:
  console_log: ['console.log', 'print']
  stderr_replace_re:
    - '^ParseError: ': 'SyntaxError: '
  errors_re:
    - '^Error: (?P<message>.+)$'
  timeout_sec: 10
  <<: *oom_prone

goja: &goja
  # While our wrapper provides print(), standard goja main doesn't
  console_log: console.log
  crash_re:
    - *go_crash_re
  errors_re:
    - '^(?P<type>[A-Za-z0-9]*Error): [^:]+\.m?js: Line (?P<line>[0-9]+):[0-9]+ (?P<message>.+)$'
  stderr_replace_re:
    # goja_nodejs/console prefixes console messages with a timestamp
    - '^20[0-9][0-9]/[0-9][0-9]/[0-9][0-9] [0-9][0-9]:[0-9][0-9]:[0-9][0-9] ': ''
    # SyntaxError: Async generators are not supported yet at /tmp/t262-1yr0wj33/t262-29634.async-iterable-input-iteration-err.strict.js:359:3
    - '^(.*SyntaxError.*) at [^: ]+\.m?js:[0-9]+:[0-9]+$': '\1'
  flags:
    # Only for our sobek wrapper (goja doesn't implement ES modules).
    # Optional: it would also recognize .mjs.
    - if: flags:module
      then:
        shell: $BINARY --help 2>&1 | grep -o -- -module

graaljs: &graaljs
  console_log: ['console.log', 'print']
  flags: &graaljs_flags
    - --experimental-options       # required for --js.test262-mode
    - --js.global-arguments=false  # required for some test262 tests
    - --js.performance
    - --js.shebang
    - --js.test262-mode            # enable $262 object
    - { if: 'flags:CanBlockIsFalse', then: '--js.agent-can-block=false' }
    - { if: 'flags:module', then: '--module' }  # must be last - takes path as parameter
  stderr_replace_re:
    # SyntaxError: foo.js:283:15 unexpected identifier: "source"
    - 'SyntaxError: [^ :]+:[0-9]+:[0-9]+ ': 'SyntaxError: '
  errors_re:
    - '^Error: (?P<message>.+)$'

# GraalJS with experimental flags
graaljs_exp:
  <<: *graaljs
  flags:
    - --js.ecmascript-version=staging
    # Enable experimental JavaScript features advertised by the binary.
    # Cherry-picked from `graaljs --help:all | grep -- --js.*default:false`.
    # See also: https://github.com/oracle/graaljs/blob/master/graal-js/src/com.oracle.truffle.js/src/com/oracle/truffle/js/runtime/JSContextOptions.java
    - shell: |
        EXP_FLAGS=(
          --js.import-bytes
          --js.import-text
          --js.json-modules
          --js.class-fields
          --js.import-attributes
          --js.private-fields-in
          --js.regexp-match-indices
          --js.regexp-unicode-sets
          --js.source-phase-imports
          --js.async-context
          --js.async-iterator-helpers
          --js.atomics-wait-async
          --js.explicit-resource-management
          --js.iterator-helpers
          --js.new-set-methods
          --js.shadow-realm
          --js.temporal
          --js.top-level-await
          --js.error-cause
        )
        $BINARY --help:all | egrep -o "($(echo "${EXP_FLAGS[@]}" | tr ' ' '|'))"
    - *graaljs_flags  # note: --module must be last

hako:
  console_log: console.log
  crash_re:
    - *go_crash_re
  errors_re:
    - '^  "name": "(?P<type>[A-Za-z0-9]*Error)",?$'  # hako_wamr/hako-cli
  timeout_sec: 10

hako_wamr:
  exit_code_may_be_test262_error: 1

hako_wasmtime_go:
  flags:
    - { if: 'flags:module', then: '--module' }

hermes: &hermes
  flags:
    - -O  # Expensive optimizations
    - -w  # Disable all warnings
    - shell: "$BINARY -help-list-hidden | egrep -o '^ *(-test262|-Xhermes-internal-test-methods|-Xes6-proxy|-Xasync-generators|-Xenable-tdz|-Xes6-block-scoping) '"
  console_log: print  # hermes main only has print()
  stderr_replace_re:
    # Syntax errors:
    # file.js:14:3: error: invalid statement encountered.
    - '([^ ]+[.]m?js:[0-9]+:[0-9]+: error: .*)': 'SyntaxError \1'
    # es5/strict.this-undefined-in-function.js - dumps both ok and fail markers
    - '[^ ]+[.]m?js:[0-9]+:[0-9]+: warning: the variable "console" was not declared.*\n *console.log\("[^"]+"\);': ''
  errors_re:
    - '^Uncaught (?P<type>[A-Za-z0-9]*Error)(: )?(?P<message>.+)$'
    - '(?P<type>(SyntaxError)) [^ ]+\.m?js:(?P<line>[0-9]+):[0-9]+: error: (?P<message>.+?)[.]?$'
    - '^[^ ]+\.m?js:[0-9]+:[0-9]+: error: (?P<message>.+?)[.]?$'
  prelude:
    - file: engines/hermes/prelude.js
  # Doesn't support ES modules yet.

iv-lv5:
  console_log: ['console.log', 'print']
  errors_re:
    # "SyntaxError: file.js:10: SyntaxError: unexpected token class"
    - '^(?P<type>[A-Za-z0-9]*Error): [^ ]+:[0-9]+: \1: (?P<message>.+)$'
  <<: *oom_prone

je-perl:
  console_log: ['console.log', 'print']
  stderr_replace_re:
    - ' at [^ ]+\.m?js, line [0-9]+\.$': ''

jerryscript: &jerryscript
  console_log: print
