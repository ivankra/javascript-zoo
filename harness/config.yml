  stderr_replace_re:
    - '^:[0-9]+:[0-9]+ ': ''
    - 'SyntaxError: [0-9]+: ': 'SyntaxError: '
  exit_code_may_be_test262_error: 3  # print '... uncaught exception: [object Object]'

nashorn:
  console_log: print
  crash_re:
    - *java_crash_re
