# QuickJS (qjs and run-test262 binaries) and derivatives
quickjs: &quickjs
  console_log: print  # qjs has both, but run-test262 only has print
  errors_re:
    - *exception_colon_message
  stderr_replace_re:
    # https://github.com/bellard/quickjs/issues/497
    - '^[{] message: "(.*)" }$': 'Test262Error: \1'
  flags:
    # run-test262 needs -N: run test prepared by test262-harness+eshost
    - shell: if $BINARY -h 2>&1 | egrep -q '(run-test262|^-N)'; then echo -N; fi
    # Add --no-unhandled-rejection if advertised (mainline quickjs)
    # to suppress "Possibly unhandled promise rejection: ..." warnings
    # with non-zero exit code. Only needed for qjs, not run-test262.
    - shell: $BINARY -h 2>&1 | grep -o -- --no-unhandled-rejection
    # https://github.com/quickjs-ng/quickjs/issues/1431
    # https://github.com/bellard/quickjs/issues/501
    - if: flags:CanBlockIsFalse
      then:
        shell: $BINARY -h 2>&1 | grep -o -- --no-can-block
    - if: flags:module
      then: --module
      else:
        # quickjs-ng frequently misdetects modules and needs explicit --script
        - shell: $BINARY -h 2>&1 | grep -o -- --script

