# Builds all engines for amd64 and arm64 architectures,
# creates docker hub image with runtimes and all binaries and
# publishes a new GitHub release.
#
# Publishing a release triggers conformance.yml in turn.
#
# Hub image build and release are gated on every engine succeeding.
# Recovery flow if a few engines fail: commit a fix, run rebuild.yml
# against the failed engines and upload to existing draft release,
# then run hub.yml to build the hub image and publish the release.
#
# SPDX-FileCopyrightText: 2026 Ivan Krasilnikov
# SPDX-License-Identifier: MIT

name: Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 1,8,15,22 * *'  # ~weekly

concurrency:
  group: build
  cancel-in-progress: false

permissions:
  contents: write  # gh release create/edit/upload
  packages: write  # GHCR push

jobs:
  init:
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.init.outputs.release_tag }}
      engines_amd64: ${{ steps.init.outputs.engines_amd64 }}
      engines_arm64: ${{ steps.init.outputs.engines_arm64 }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Set release tag and engine lists
        id: init
        run: |
          RELEASE_TAG=$(date +%Y%m%d)
          echo "release_tag=$RELEASE_TAG" | tee -a "$GITHUB_OUTPUT"

          AMD64=$(cd engines && DOCKER_ARCH=amd64 make list | jq -R . | jq -sc .)
          echo "engines_amd64=$AMD64" | tee -a "$GITHUB_OUTPUT"

          ARM64=$(cd engines && DOCKER_ARCH=arm64 make list | jq -R . | jq -sc .)
          echo "engines_arm64=$ARM64" | tee -a "$GITHUB_OUTPUT"

      - name: Create draft release
        run: |
          TAG=${{ steps.init.outputs.release_tag }}
          gh release delete $TAG --yes 2>/dev/null || true
          gh release create $TAG --title $TAG --draft --target $GITHUB_SHA

  # Build base toolchain images (build/jsz-*.Dockerfile) and push them to GHCR.
  # Images are tagged {name}:{arch}, e.g.:
  #   ghcr.io/${{ github.repository }}/jsz-gcc:amd64
  #   ghcr.io/${{ github.repository }}/jsz-clang23:arm64
  base:
    needs: init
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - &ghcr_login
        name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - &checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Build and push base toolchain images
        run: DOCKER_PUSH=1 DOCKER_REGISTRY=ghcr.io/${{ github.repository }} make -C build all

  # Builder for amd64 binaries
  engine-amd64:
    needs: [init, base]
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      DOCKER_ARCH: amd64
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        engine: ${{ fromJson(needs.init.outputs.engines_amd64) }}
    steps:
      - &free_disk_space
        name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true

      - *ghcr_login
      - *checkout

      # Retry handles transient failures (OOM, network); timeout matches job limit intentionally.
      - &build_engine
        name: Build engine
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 360
          command: DIST_REMOVE_IMAGE=1 DOCKER_REGISTRY=ghcr.io/${{ github.repository }} make -C engines/${{ matrix.engine }} dist

      - &upload_to_release
        name: Upload to release
        run: |
          rm -f dist/amd64/jscript-dist/jscript*.dll dist/amd64/jscript9-dist/jscript*.dll  # proprietary DLLs, amd64 only
          rm -f dist/${DOCKER_ARCH}/*.dbg
          tar -c -C dist/${DOCKER_ARCH} . | zstd -19 -o "${{ matrix.engine }}.${DOCKER_ARCH}.tar.zst"
          for i in 1 2 3 4 5; do
            gh release upload --clobber "${{ needs.init.outputs.release_tag }}" "${{ matrix.engine }}.${DOCKER_ARCH}.tar.zst" && exit 0
            sleep 60
          done
          exit 1

  # Builder for arm64 binaries.
  # Separate from amd64 as job matrix expansion is limited to only 256 items.
  engine-arm64:
    needs: [init, base]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    env:
      DOCKER_ARCH: arm64
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        engine: ${{ fromJson(needs.init.outputs.engines_arm64) }}
    steps:
      - *free_disk_space
      - *ghcr_login
      - *checkout
      - *build_engine
      - *upload_to_release

  # Build and push hub image. Pass REV=$GITHUB_SHA so hub.Dockerfile can locally
  # tag the build commit as $TAG which doesn't yet exist.
  hub:
    needs: [init, engine-amd64, engine-arm64]
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REV: ${{ github.sha }}
    steps:
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - *checkout
      - *ghcr_login

      - name: Build and push ghcr.io/${{ github.repository }}/hub
        run: build/hub.sh ghcr.io/${{ github.repository }}/hub ${{ needs.init.outputs.release_tag }}

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login docker.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Build and push docker.io/${{ github.repository }}
        run: build/hub.sh docker.io/${{ github.repository }} ${{ needs.init.outputs.release_tag }}

  publish:
    needs: [init, hub]
    runs-on: ubuntu-24.04
    env:
      # PAT needed to trigger conformance.yml - GITHUB_TOKEN-created events don't.
      GH_TOKEN: ${{ secrets.JSZ_RELEASE_GITHUB_TOKEN }}
    steps:
      - name: Publish release
        run: |
          for i in 1 2 3 4 5; do
            gh release edit ${{ needs.init.outputs.release_tag }} --draft=false --repo ${{ github.repository }} && exit 0
            sleep 60
          done
          exit 1
