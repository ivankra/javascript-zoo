# Conformance testing for all engines using the hub image.

name: Conformance

on:
  # Automatically trigger after Build workflow finishes
  workflow_run:
    workflows: ['Build']
    types: [completed]
    branches: [main]
  # Manual trigger
  workflow_dispatch:
    inputs:
      conformance_shards:
        description: 'Parallel shards for conformance suites'
        default: 20
        type: number
      test262_shards:
        description: 'Parallel shards for test262'
        default: 152
        type: number
      release:
        description: 'Release tag'
        default: 'latest'
        type: string

permissions:
  contents: read
  packages: read

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  init:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.init.outputs.tag }}
      conformance_shards: ${{ steps.init.outputs.conformance_shards }}
      conformance_shard_list: ${{ steps.init.outputs.conformance_shard_list }}
      test262_shards: ${{ steps.init.outputs.test262_shards }}
      test262_shard_list: ${{ steps.init.outputs.test262_shard_list }}
    steps:
      - name: Resolve release tag and build shard arrays
        id: init
        run: |
          TAG="${{ inputs.release }}"
          if [[ "$TAG" == "latest" || -z "$TAG" ]]; then
            TAG=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName)
          fi
          echo "tag=$TAG" | tee -a "$GITHUB_OUTPUT"

          N1="${{ inputs.conformance_shards }}"
          N1="${N1:-20}"
          echo "conformance_shards=$N1" | tee -a "$GITHUB_OUTPUT"
          echo "conformance_shard_list=$(seq 1 "$N1" | jq -R 'tonumber' | jq -sc .)" | tee -a "$GITHUB_OUTPUT"

          N2="${{ inputs.test262_shards }}"
          N2="${N2:-150}"
          echo "test262_shards=$N2" | tee -a "$GITHUB_OUTPUT"
          echo "test262_shard_list=$(seq 1 "$N2" | jq -R 'tonumber' | jq -sc .)" | tee -a "$GITHUB_OUTPUT"

  conformance:
    needs: init
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.init.outputs.conformance_shard_list) }}
    runs-on: ubuntu-24.04
    steps:
      # Sometimes github runner just doesn't come with enough free disk space...
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      # Add extra swap in addition to 3G /swapfile + 16G RAM / 4C on ubuntu-24.04 runners
      # for a total of 16G RAM + 16G swap. Need at least 2-3G for system.
      - name: Add extra swap
        run: |
          set -x
          sudo fallocate -l 13G /extra-swapfile
          sudo chmod 600 /extra-swapfile
          sudo mkswap /extra-swapfile
          sudo swapon /extra-swapfile
          swapon --show; free -h; df -h; nproc

      # Use latest harness and test262 from default branch, not the release commit - that's only for binaries.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          submodules: true

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Pull hub image
        run: docker pull ghcr.io/ivankra/javascript-zoo/hub:${{ needs.init.outputs.tag }}

      - name: Select engines for this shard
        id: engines
        run: |
          ENGINES=$(docker run --rm ghcr.io/ivankra/javascript-zoo/hub:${{ needs.init.outputs.tag }} cat /dist/LIST | sed -n '${{ matrix.shard }}~${{ needs.init.outputs.conformance_shards }}p' | tr '\n' ' ')
          echo "engines=$ENGINES" | tee -a "$GITHUB_OUTPUT"

      - name: Run conformance tests (es1-5, compat-table)
        run: |
          IMAGE=ghcr.io/ivankra/javascript-zoo/hub:${{ needs.init.outputs.tag }}
          DR="docker run --rm -m 14g --memory-swap 24g --tmpfs /tmp -e PYTHONDONTWRITEBYTECODE=1 -v $(pwd):/zoo:ro -v $(pwd)/results:/results $IMAGE python3"
          mkdir -p results/es1-5 results/compat-table
          set -x;
          for engine in ${{ steps.engines.outputs.engines }}; do
            $DR /zoo/harness/run.py --shuffle -o "/results/es1-5/$engine.json" "/dist/$engine" "es[1-5]";
            $DR /zoo/harness/run.py --shuffle -o "/results/compat-table/$engine.json" "/dist/$engine" compat-table;
          done

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: conformance-shard-${{ matrix.shard }}
          path: results/
          if-no-files-found: ignore

  test262:
    needs: init
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.init.outputs.test262_shard_list) }}
    runs-on: ubuntu-24.04
    steps:
      # Sometimes github runner just doesn't come with enough free disk space...
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      # Add extra swap in addition to 3G /swapfile + 16G RAM / 4C on ubuntu-24.04 runners
      # for a total of 16G RAM + 16G swap. Need at least 2-3G for system.
      - name: Add extra swap
        run: |
          set -x
          sudo fallocate -l 13G /extra-swapfile
          sudo chmod 600 /extra-swapfile
          sudo mkswap /extra-swapfile
          sudo swapon /extra-swapfile
          swapon --show; free -h; df -h; nproc

      # Use latest harness and test262 from default branch, not the release commit - that's only for binaries.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          submodules: true

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Pull hub image
        run: docker pull ghcr.io/ivankra/javascript-zoo/hub:${{ needs.init.outputs.tag }}

      - name: Select engines for this shard
        id: engines
        run: |
          ENGINES=$(docker run --rm ghcr.io/ivankra/javascript-zoo/hub:${{ needs.init.outputs.tag }} cat /dist/LIST | sed -n '${{ matrix.shard }}~${{ needs.init.outputs.test262_shards }}p' | tr '\n' ' ')
          echo "engines=$ENGINES" | tee -a "$GITHUB_OUTPUT"

      - name: Run test262
        run: |
          IMAGE=ghcr.io/ivankra/javascript-zoo/hub:${{ needs.init.outputs.tag }}
          DR="docker run --rm -m 14g --memory-swap 24g --tmpfs /tmp -e PYTHONDONTWRITEBYTECODE=1 -v $(pwd):/zoo:ro -v $(pwd)/results:/results $IMAGE python3"
          mkdir -p results/test262
          set -x;
          for engine in ${{ steps.engines.outputs.engines }}; do
            $DR /zoo/harness/test262.py --progress=100 --shuffle -o "/results/test262/$engine.json" "/dist/$engine";
          done

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test262-shard-${{ matrix.shard }}
          path: results/
          if-no-files-found: ignore

  merge:
    needs: [init, conformance, test262]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Download all shard results
        uses: actions/download-artifact@v6
        with:
          path: all-results
          pattern: '{conformance,test262}-*'
          merge-multiple: false

      - name: Merge results
        run: |
          mkdir -p merged/es1-5 merged/compat-table merged/test262
          for dir in all-results/conformance-shard-*/; do
            [[ -d "$dir" ]] || continue
            cp -n "$dir"/es1-5/*.json merged/es1-5/ 2>/dev/null || true
            cp -n "$dir"/compat-table/*.json merged/compat-table/ 2>/dev/null || true
          done
          for dir in all-results/test262-shard-*/; do
            [[ -d "$dir" ]] || continue
            cp -n "$dir"/test262/*.json merged/test262/ 2>/dev/null || true
          done

      - name: Upload merged results
        uses: actions/upload-artifact@v6
        with:
          name: conformance-results-${{ needs.init.outputs.tag }}
          path: merged/
          if-no-files-found: warn
