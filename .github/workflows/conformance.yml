# Conformance testing for all engines using the hub image.

name: Conformance

on:
  # Automatically trigger after Build workflow finishes
  workflow_run:
    workflows: ['Build']
    types: [completed]
    branches: [main]
  # Manual trigger
  workflow_dispatch:
    inputs:
      conformance_shards:
        description: 'Parallel shards for conformance suites'
        default: &default_conformance_shards 10
        type: number
      test262_shards:
        description: 'Parallel shards for test262'
        default: &default_test262_shards 156
        type: number
      release:
        description: 'Release tag'
        default: 'latest'
        type: string

concurrency:
  group: conformance
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DEFAULT_CONFORMANCE_SHARDS: *default_conformance_shards
  DEFAULT_TEST262_SHARDS: *default_test262_shards
  EXP_CONFIGS: graaljs_exp jsc_exp spidermonkey_exp v8_exp

jobs:
  init:
    # Skip when triggered by a failed Build workflow run
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.init.outputs.tag }}
      conformance_shards: ${{ steps.init.outputs.conformance_shards }}
      conformance_shard_list: ${{ steps.init.outputs.conformance_shard_list }}
      test262_shards: ${{ steps.init.outputs.test262_shards }}
      test262_shard_list: ${{ steps.init.outputs.test262_shard_list }}
    steps:
      - name: Resolve release tag and build shard arrays
        id: init
        run: |
          TAG="${{ inputs.release }}"
          if [[ "$TAG" == "latest" || -z "$TAG" ]]; then
            TAG=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName)
          fi
          echo "tag=$TAG" | tee -a "$GITHUB_OUTPUT"

          N1="${{ inputs.conformance_shards }}"
          N1="${N1:-$DEFAULT_CONFORMANCE_SHARDS}"
          echo "conformance_shards=$N1" | tee -a "$GITHUB_OUTPUT"
          echo "conformance_shard_list=$(seq 1 "$N1" | jq -R 'tonumber' | jq -sc .)" | tee -a "$GITHUB_OUTPUT"

          N2="${{ inputs.test262_shards }}"
          N2="${N2:-$DEFAULT_TEST262_SHARDS}"
          echo "test262_shards=$N2" | tee -a "$GITHUB_OUTPUT"
          echo "test262_shard_list=$(seq 1 "$N2" | jq -R 'tonumber' | jq -sc .)" | tee -a "$GITHUB_OUTPUT"

  conformance:
    needs: init
    timeout-minutes: 360
    env:
      DOCKER_IMAGE: ghcr.io/ivankra/javascript-zoo/hub:${{ needs.init.outputs.tag }}
      SHARDS: ${{ needs.init.outputs.conformance_shards }}
      SHARD_PREFIX: conformance
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.init.outputs.conformance_shard_list) }}
    runs-on: ubuntu-24.04
    steps:
      # Sometimes github runner just doesn't come with enough free disk space...
      - &free_disk_space
        name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      # Add extra swap in addition to 3G /swapfile + 16G RAM / 4C on ubuntu-24.04 runners
      # for a total of 16G RAM + 16G swap. Need at least 2-3G for system.
      - &add_swap
        name: Add extra swap
        run: |
          set -x
          sudo fallocate -l 13G /extra-swapfile
          sudo chmod 600 /extra-swapfile
          sudo mkswap /extra-swapfile
          sudo swapon /extra-swapfile
          swapon --show; free -h; df -h; nproc

      # Use latest harness and test262 from default branch, not the release commit - that's only for binaries.
      - &checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          submodules: true

      - &pull_docker_image
        name: Pull hub image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker pull "$DOCKER_IMAGE"

      - &select_engines
        name: Select engines for this shard
        id: select_engines
        run: |
          ENGINES=$( \
            (echo $EXP_CONFIGS | tr ' ' '\n'; docker run --rm "$DOCKER_IMAGE" cat /dist/LIST) \
            | sed -n '${{ matrix.shard }}~'"$SHARDS"'p' | tr '\n' ' ')
          echo "engines=$ENGINES" | tee -a "$GITHUB_OUTPUT"

      - name: Run conformance tests
        run: |
          DR="docker run --rm -m 12g --memory-swap 24g --tmpfs /tmp -e PYTHONDONTWRITEBYTECODE=1 -v $(pwd):/zoo:ro -v $(pwd)/results:/results $DOCKER_IMAGE python3"
          mkdir -p results/es1-5 results/compat-table
          set -x;
          for engine in ${{ steps.select_engines.outputs.engines }}; do
            # For *_exp (EXP_CONFIGS): pass --config *_exp, but use *[_full] binary.
            if [[ "$engine" == *_exp ]]; then
              extra="--config=$engine"
              binary=/dist/${engine/_exp}
              if [[ "$engine" == spidermonkey_exp || "$engine" == v8_exp ]]; then
                binary+="_full"  # use full-featured build
              fi
            else
              binary="/dist/$engine"
              extra=""
            fi
            # For jscript/jscript9 to download .dll's. TODO: remove after run.py starts probing for print
            $DR /zoo/harness/probe.py "$binary";
            $DR /zoo/harness/run.py $extra --shuffle -o "/results/es1-5/$engine.json" "$binary" "es[1-5]";
            $DR /zoo/harness/run.py $extra --shuffle -o "/results/compat-table/$engine.json" "$binary" compat-table;
          done

      - &upload_shard_results
        name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.SHARD_PREFIX }}-shard-${{ matrix.shard }}
          path: results/
          if-no-files-found: ignore

  test262:
    needs: init
    timeout-minutes: 360
    env:
      DOCKER_IMAGE: ghcr.io/ivankra/javascript-zoo/hub:${{ needs.init.outputs.tag }}
      SHARDS: ${{ needs.init.outputs.test262_shards }}
      SHARD_PREFIX: test262
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.init.outputs.test262_shard_list) }}
    runs-on: ubuntu-24.04
    steps:
      - *free_disk_space
      - *add_swap
      - *checkout
      - *pull_docker_image
      - *select_engines

      - name: Run test262
        run: |
          DR="docker run --rm -m 12g --memory-swap 24g --tmpfs /tmp -e PYTHONDONTWRITEBYTECODE=1 -v $(pwd):/zoo:ro -v $(pwd)/results:/results $DOCKER_IMAGE python3"
          mkdir -p results/test262
          set -x;
          for engine in ${{ steps.select_engines.outputs.engines }}; do
            # For *_exp (EXP_CONFIGS): pass --config *_exp, but use *[_full] binary.
            if [[ "$engine" == *_exp ]]; then
              extra="--config=$engine"
              binary=/dist/${engine/_exp}
              if [[ "$engine" == spidermonkey_exp || "$engine" == v8_exp ]]; then
                binary+="_full"  # use full-featured build
              fi
            else
              binary="/dist/$engine"
              extra=""
            fi
            $DR /zoo/harness/test262.py $extra --progress=100 --shuffle -o "/results/test262/$engine.json" "$binary";
          done

      - *upload_shard_results

  merge:
    needs: [init, conformance, test262]
    if: always() && needs.init.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Download all shard results
        uses: actions/download-artifact@v6
        with:
          path: all-results
          pattern: '{conformance,test262}-*'
          merge-multiple: false

      - name: Merge results
        run: |
          mkdir -p merged/es1-5 merged/compat-table merged/test262
          for dir in all-results/conformance-shard-*/; do
            [[ -d "$dir" ]] || continue
            cp -n "$dir"/es1-5/*.json merged/es1-5/ 2>/dev/null || true
            cp -n "$dir"/compat-table/*.json merged/compat-table/ 2>/dev/null || true
          done
          for dir in all-results/test262-shard-*/; do
            [[ -d "$dir" ]] || continue
            cp -n "$dir"/test262/*.json merged/test262/ 2>/dev/null || true
          done

      - name: Upload merged results
        uses: actions/upload-artifact@v6
        with:
          name: conformance-results-${{ needs.init.outputs.tag }}
          path: merged/
          if-no-files-found: warn
