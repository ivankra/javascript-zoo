# Conformance testing for all engines using the hub image.
#
# Intentionally runs harness from main HEAD against hub:${release_tag}
# binaries, so the latest scoring logic applies to historical releases.

name: Conformance

on:
  # Automatic trigger when a release is published (by build.yml, hub.yml or manually).
  release:
    types: [published]
  # Manual trigger
  workflow_dispatch:
    inputs:
      conformance_shards:
        description: 'Parallel shards for conformance suites'
        default: &default_conformance_shards 5
        type: number
      test262_shards:
        description: 'Parallel shards for test262'
        default: &default_test262_shards 156
        type: number
      release:
        description: 'Release tag'
        default: 'latest'
        type: string
      engines:
        description: 'Engines (space-separated, empty=all)'
        default: ''
        type: string
      commit:
        description: 'Commit results to data repo'
        default: false
        type: boolean

concurrency:
  # Manual runs with custom engines get their own group so they don't cancel/block the default run
  group: ${{ github.event_name == 'workflow_dispatch' && inputs.engines != '' && format('conformance-manual-{0}', github.run_id) || 'conformance' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DEFAULT_CONFORMANCE_SHARDS: *default_conformance_shards
  DEFAULT_TEST262_SHARDS: *default_test262_shards
  EXP_CONFIGS: graaljs_exp jsc_exp spidermonkey_exp v8_exp

jobs:
  init:
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.init.outputs.release_tag }}
      engines: ${{ steps.init.outputs.engines }}
      conformance_shards: ${{ steps.init.outputs.conformance_shards }}
      conformance_shard_list: ${{ steps.init.outputs.conformance_shard_list }}
      test262_shards: ${{ steps.init.outputs.test262_shards }}
      test262_shard_list: ${{ steps.init.outputs.test262_shard_list }}
      should_commit: ${{ steps.init.outputs.should_commit }}
    steps:
      - name: Resolve release tag and build shard arrays
        id: init
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.release }}"
            if [[ "$TAG" == "latest" || -z "$TAG" ]]; then
              TAG=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName)
            fi
          fi
          echo "release_tag=$TAG" | tee -a "$GITHUB_OUTPUT"

          ENGINES="${{ inputs.engines }}"
          echo "engines=$ENGINES" | tee -a "$GITHUB_OUTPUT"

          # Determine whether to commit results to data repo
          if [[ "${{ github.event_name }}" == "release" && "$TAG" =~ ^[0-9]{8}$ ]]; then
            # Auto-commit only for production YYYYMMDD release tags. Test
            # publishes with any other tag name (e.g. "test-foo") won't commit.
            echo "should_commit=true" | tee -a "$GITHUB_OUTPUT"
          elif [[ "${{ inputs.commit }}" == "true" ]]; then
            echo "should_commit=true" | tee -a "$GITHUB_OUTPUT"
          else
            echo "should_commit=false" | tee -a "$GITHUB_OUTPUT"
          fi

          N1="${{ inputs.conformance_shards }}"
          N1="${N1:-$DEFAULT_CONFORMANCE_SHARDS}"
          echo "conformance_shards=$N1" | tee -a "$GITHUB_OUTPUT"
          echo "conformance_shard_list=$(seq 1 "$N1" | jq -R 'tonumber' | jq -sc .)" | tee -a "$GITHUB_OUTPUT"

          N2="${{ inputs.test262_shards }}"
          N2="${N2:-$DEFAULT_TEST262_SHARDS}"
          echo "test262_shards=$N2" | tee -a "$GITHUB_OUTPUT"
          echo "test262_shard_list=$(seq 1 "$N2" | jq -R 'tonumber' | jq -sc .)" | tee -a "$GITHUB_OUTPUT"

  conformance:
    needs: init
    timeout-minutes: 360
    env:
      DOCKER_IMAGE: ghcr.io/ivankra/javascript-zoo/hub:${{ needs.init.outputs.release_tag }}
      SHARDS: ${{ needs.init.outputs.conformance_shards }}
      SHARD_PREFIX: conformance
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.init.outputs.conformance_shard_list) }}
    runs-on: ubuntu-24.04
    steps:
      # Sometimes github runner just doesn't come with enough free disk space...
      - &free_disk_space
        name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      # Add extra swap in addition to 3G /swapfile + 16G RAM / 4C on ubuntu-24.04 runners
      # for a total of 16G RAM + 16G swap. Need at least 2-3G for system.
      - &add_swap
        name: Add extra swap
        run: |
          set -x
          sudo fallocate -l 13G /extra-swapfile
          sudo chmod 600 /extra-swapfile
          sudo mkswap /extra-swapfile
          sudo swapon /extra-swapfile
          swapon --show; free -h; df -h; nproc

      # Use latest harness and test262 from default branch, not the release commit - that's only for binaries.
      - &checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          submodules: true

      - &pull_docker_image
        name: Pull hub image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker pull "$DOCKER_IMAGE"

      - &select_engines
        name: Select engines for this shard
        id: select_engines
        env:
          INPUT_ENGINES: ${{ needs.init.outputs.engines }}
        run: |
          if [[ -n "$INPUT_ENGINES" ]]; then
            ENGINES="$INPUT_ENGINES"
          else
            ENGINES="$(echo $EXP_CONFIGS | tr ' ' '\n'; docker run --rm "$DOCKER_IMAGE" cat /dist/LIST)"
          fi
          ENGINES=$(echo "$ENGINES" | tr ' ' '\n' | grep -v '^$' | sed -n '${{ matrix.shard }}~'"$SHARDS"'p' | tr '\n' ' ')
          echo "engines=$ENGINES" | tee -a "$GITHUB_OUTPUT"

      - name: Run conformance tests
        run: |
          DR="docker run --rm --cpu-shares=2 -m 12g --memory-swap=24g --tmpfs=/tmp --ulimit=core=0 -e PYTHONDONTWRITEBYTECODE=1 -v $(pwd):/zoo:ro -v $(pwd)/results:/results $DOCKER_IMAGE python3"
          mkdir -p results/es1-5 results/compat-table
          set -x
          for engine in ${{ steps.select_engines.outputs.engines }}; do
            # For *_exp (EXP_CONFIGS): pass --config *_exp, but use *[_full] binary.
            if [[ "$engine" == *_exp ]]; then
              extra="--config=$engine"
              binary=/dist/${engine/_exp}
              if [[ "$engine" == spidermonkey_exp || "$engine" == v8_exp ]]; then
                binary+="_full"  # use full-featured build
              fi
            else
              binary="/dist/$engine"
              extra=""
            fi
            # For jscript/jscript9 to download .dll's. TODO: remove after run.py starts probing for print
            $DR /zoo/harness/probe.py "$binary";
            $DR /zoo/harness/run.py $extra --shuffle -o "/results/es1-5/$engine.json" "$binary" "es[1-5]";
            $DR /zoo/harness/run.py $extra --shuffle -o "/results/compat-table/$engine.json" "$binary" compat-table;
          done

      - &upload_artifact
        name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.SHARD_PREFIX }}-shard-${{ matrix.shard }}
          path: results/
          if-no-files-found: ignore

  test262:
    needs: init
    timeout-minutes: 360
    env:
      DOCKER_IMAGE: ghcr.io/ivankra/javascript-zoo/hub:${{ needs.init.outputs.release_tag }}
      SHARDS: ${{ needs.init.outputs.test262_shards }}
      SHARD_PREFIX: test262
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.init.outputs.test262_shard_list) }}
    runs-on: ubuntu-24.04
    steps:
      - *free_disk_space
      - *add_swap
      - *checkout
      - *pull_docker_image
      - *select_engines

      - name: Run test262
        run: |
          DR="docker run --rm --cpu-shares=2 -m 12g --memory-swap=24g --tmpfs=/tmp --ulimit=core=0 -e PYTHONDONTWRITEBYTECODE=1 -v $(pwd):/zoo:ro -v $(pwd)/results:/results $DOCKER_IMAGE python3"
          mkdir -p results/test262 results/test262-tags
          set -x
          for engine in ${{ steps.select_engines.outputs.engines }}; do
            # For *_exp (EXP_CONFIGS): pass --config *_exp, but use *[_full] binary.
            if [[ "$engine" == *_exp ]]; then
              extra="--config=$engine"
              binary=/dist/${engine/_exp}
              if [[ "$engine" == spidermonkey_exp || "$engine" == v8_exp ]]; then
                binary+="_full"  # use full-featured build
              fi
            else
              binary="/dist/$engine"
              extra=""
            fi
            $DR /zoo/harness/test262.py $extra --progress=100 --shuffle -o "/results/test262/$engine.json" --output-tags="/results/test262-tags/latest.json" "$binary";
          done

      - *upload_artifact

  merge:
    needs: [init, conformance, test262]
    if: always() && needs.init.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Download all shard results
        uses: actions/download-artifact@v6
        with:
          path: all-results
          pattern: '{conformance,test262}-*'
          merge-multiple: false

      - name: Merge results
        run: |
          mkdir -p merged/es1-5 merged/compat-table merged/test262
          for dir in all-results/conformance-shard-*/; do
            [[ -d "$dir" ]] || continue
            cp -n "$dir"/es1-5/*.json merged/es1-5/ 2>/dev/null || true
            cp -n "$dir"/compat-table/*.json merged/compat-table/ 2>/dev/null || true
          done
          for dir in all-results/test262-shard-*/; do
            [[ -d "$dir" ]] || continue
            cp -n "$dir"/test262/*.json merged/test262/ 2>/dev/null || true
          done

          echo "=== test262-tags sha256sums ==="
          sha256sum all-results/test262-shard-*/test262-tags/latest.json 2>/dev/null || true

          # For each shard, extract test262 revision from its main report file
          # and put its tags file into merged/test262-tags/ as <revision>.json.
          # Should be the same file in all shards, but just in case.
          mkdir -p merged/test262-tags
          LAST_REV=""
          for dir in all-results/test262-shard-*/; do
            [[ -f "$dir/test262-tags/latest.json" ]] || continue
            REV=$(jq -r '.test262.revision // empty' "$dir"/test262/*.json 2>/dev/null | head -1) || true
            [[ -n "$REV" ]] || continue
            echo "shard $dir: test262 revision $REV"
            mv -f "$dir/test262-tags/latest.json" "merged/test262-tags/$REV.json"
            LAST_REV="$REV"
          done
          # Copy the last one as latest.json. Not symlink - won't survive upload-artifact.
          if [[ -n "$LAST_REV" ]]; then
            cp -af "merged/test262-tags/$LAST_REV.json" merged/test262-tags/latest.json
          fi

      - name: Upload merged results
        uses: actions/upload-artifact@v6
        with:
          name: conformance-results-${{ needs.init.outputs.release_tag }}
          path: merged/
          if-no-files-found: warn

      - name: Commit to javascript-zoo-data
        if: needs.init.outputs.should_commit == 'true' && needs.conformance.result == 'success' && needs.test262.result == 'success'
        env:
          JSZ_DATA_GITHUB_TOKEN: ${{ secrets.JSZ_DATA_GITHUB_TOKEN }}
        run: |
          git clone --branch data --single-branch --depth 1 "https://x-access-token:${JSZ_DATA_GITHUB_TOKEN}@github.com/ivankra/javascript-zoo-data.git" data-repo

          cd data-repo
          for dir in es1-5 compat-table test262 test262-tags; do
            mkdir -p $dir
            cp -f ../merged/$dir/*.json $dir/ || true
          done
          make || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "conformance.yml workflow for release ${{ needs.init.outputs.release_tag }}"
            git push
          fi
